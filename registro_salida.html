<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.R. — Registro de Salida</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --azul-principal: #004a99; 
            --azul-cielo: #e3f2fd; 
            --blanco: #ffffff; 
            --gris-texto: #546e7a;
            --verde-wa: #25D366;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--azul-cielo); 
            font-family: 'DM Sans', sans-serif; 
            color: var(--azul-principal);
            padding: 15px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--blanco);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,74,153,0.1);
            overflow: hidden;
        }

        .header {
            background: var(--azul-principal);
            color: var(--blanco);
            padding: 25px;
            text-align: center;
        }

        .header h2 { font-weight: 700; letter-spacing: 1px; }

        .content { padding: 20px; }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--gris-texto);
            margin: 20px 0 10px;
            border-bottom: 2px solid var(--azul-cielo);
            padding-bottom: 5px;
            font-weight: 700;
        }

        label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 5px; color: var(--azul-principal); }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid var(--azul-cielo);
            border-radius: 10px;
            font-family: inherit;
            color: var(--azul-principal);
            background: #f8fbff;
        }

        input:focus { border-color: var(--azul-principal); outline: none; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* Estilo para las fotos */
        .foto-box {
            background: #f0f7ff;
            border: 1px solid var(--azul-cielo);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        /* Firma */
        canvas {
            border: 2px dashed var(--azul-cielo);
            border-radius: 12px;
            width: 100%;
            height: 150px;
            background: #fff;
            touch-action: none;
        }

        /* Botones */
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-save { background: var(--azul-principal); color: white; }
        .btn-save:disabled { background: #ccc; }

        .btn-wa { 
            background: var(--verde-wa); 
            color: white; 
            display: none; 
            text-decoration: none; 
            text-align: center;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>REGISTRO J.R.</h2>
        <p style="font-size: 12px; opacity: 0.8;">Control de Salida de Carrozas</p>
    </div>

    <div class="content">
        <div class="section-title">Información General</div>
        
        <label>Regional</label>
        <select id="regional">
            <option value="Pereira">Pereira</option>
            <option value="Armenia">Armenia</option>
            <option value="Manizales">Manizales</option>
            <option value="Cali">Cali</option>
        </select>

        <label>Conductor</label>
        <input type="text" id="conductor" placeholder="Nombre del conductor">

        <label>Placa del Vehículo</label>
        <input type="text" id="placa" placeholder="Ej: ABC-123">

        <div class="section-title">Detalles del Traslado</div>
        
        <label>Nombre del Fallecido</label>
        <input type="text" id="fallecido" placeholder="Nombre completo">

        <label>Lugar de Destino</label>
        <input type="text" id="destino" placeholder="Ciudad o Funeraria">

        <div class="grid-2">
            <div>
                <label>KM Salida</label>
                <input type="number" id="km_s" oninput="calcularTotal()">
            </div>
            <div>
                <label>KM Ingreso</label>
                <input type="number" id="km_i" oninput="calcularTotal()">
            </div>
        </div>
        <label>Total Kilómetros</label>
        <input type="number" id="total_km" readonly style="background: #eef5ff; font-weight: bold;">

        <div class="section-title">Evidencias Fotográficas</div>
        <div class="foto-box">
            <label>1. Frontal / Inicio</label>
            <input type="file" id="foto1" accept="image/*" capture="camera">
        </div>
        <div class="foto-box">
            <label>2. Documentos</label>
            <input type="file" id="foto2" accept="image/*" capture="camera">
        </div>
        <div class="foto-box">
            <label>3. Destino / Llegada</label>
            <input type="file" id="foto3" accept="image/*" capture="camera">
        </div>
        <div class="foto-box">
            <label>4. Kilometraje / Otro</label>
            <input type="file" id="foto4" accept="image/*" capture="camera">
        </div>

        <div class="section-title">Confirmación</div>
        <label>Firma del Responsable</label>
        <canvas id="canvas"></canvas>
        <p onclick="borrarFirma()" style="text-align: right; font-size: 12px; color: #d32f2f; cursor: pointer; margin-top: 5px;">✖ Borrar firma</p>

        <label style="margin-top: 15px;">Enviar Reporte a:</label>
        <select id="select-coordinador" style="border: 2px solid var(--verde-wa);">
            <option value="573001234567">Coordinador Principal</option>
            <option value="573110000000">Logística J.R.</option>
            <option value="573220000000">Gerencia</option>
        </select>

        <button class="btn btn-save" id="btn-envio" onclick="guardarTodo()">1. GUARDAR EN BASE DE DATOS</button>
        <button class="btn btn-wa" id="btn-wa" onclick="enviarWA()">2. ENVIAR POR WHATSAPP</button>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="db.js"></script>
<script>
    // --- LÓGICA DE FIRMA ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let dibujando = false;

    function obtenerPosicion(e) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: (e.clientX || e.touches[0].clientX) - rect.left,
            y: (e.clientY || e.touches[0].clientY) - rect.top
        };
    }

    function iniciar(e) { dibujando = true; ctx.beginPath(); const p = obtenerPosicion(e); ctx.moveTo(p.x, p.y); }
    function mover(e) {
        if (!dibujando) return;
        e.preventDefault();
        const p = obtenerPosicion(e);
        ctx.lineTo(p.x, p.y);
        ctx.strokeStyle = "#004a99";
        ctx.lineWidth = 2;
        ctx.stroke();
    }
    function detener() { dibujando = false; }

    canvas.addEventListener('mousedown', iniciar);
    canvas.addEventListener('mousemove', mover);
    window.addEventListener('mouseup', detener);
    canvas.addEventListener('touchstart', iniciar);
    canvas.addEventListener('touchmove', mover);
    canvas.addEventListener('touchend', detener);

    function borrarFirma() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    // --- CÁLCULOS ---
    function calcularTotal() {
        const s = parseFloat(document.getElementById('km_s').value) || 0;
        const i = parseFloat(document.getElementById('km_i').value) || 0;
        document.getElementById('total_km').value = (i - s).toFixed(1);
    }

    // --- PROCESAMIENTO ---
    const aBase64 = archivo => new Promise((resolve) => {
        if (!archivo) resolve("");
        const reader = new FileReader();
        reader.readAsDataURL(archivo);
        reader.onload = () => resolve(reader.result);
    });

    let datosFinales = {};

    async function guardarTodo() {
        const btn = document.getElementById('btn-envio');
        btn.disabled = true;
        btn.innerText = "⏳ Guardando datos...";

        try {
            datosFinales = {
                regional: document.getElementById('regional').value,
                conductor: document.getElementById('conductor').value,
                placa: document.getElementById('placa').value,
                fallecido: document.getElementById('fallecido').value,
                destino: document.getElementById('destino').value,
                km_salida: document.getElementById('km_s').value,
                km_ingreso: document.getElementById('km_i').value,
                total_km: document.getElementById('total_km').value,
                imagen1: await aBase64(document.getElementById('foto1').files[0]),
                imagen2: await aBase64(document.getElementById('foto2').files[0]),
                imagen3: await aBase64(document.getElementById('foto3').files[0]),
                imagen4: await aBase64(document.getElementById('foto4').files[0]),
                firma: canvas.toDataURL()
            };

            const res = await DB.guardarTraslado(datosFinales);
            
            if(res.ok) {
                showToast("✅ Guardado con éxito");
                btn.innerText = "✓ DATOS GUARDADOS";
                document.getElementById('btn-wa').style.display = "block";
            } else { throw res.error; }

        } catch (e) {
            alert("Error: " + e.message);
            btn.disabled = false;
            btn.innerText = "REINTENTAR GUARDAR";
        }
    }

    function enviarWA() {
        const num = document.getElementById('select-coordinador').value;
        const msg = `*REGISTRO TRASLADO J.R.*\n\n` +
                    `*Conductor:* ${datosFinales.conductor}\n` +
                    `*Placa:* ${datosFinales.placa}\n` +
                    `*Fallecido:* ${datosFinales.fallecido}\n` +
                    `*Destino:* ${datosFinales.destino}\n` +
                    `*Ruta:* ${datosFinales.km_salida} km a ${datosFinales.km_ingreso} km\n` +
                    `*Total:* ${datosFinales.total_km} km\n\n` +
                    `_Soportes registrados en Supabase._`;
        
        window.open(`https://api.whatsapp.com/send?phone=${num}&text=${encodeURIComponent(msg)}`, '_blank');
    }

    function showToast(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.style.display = "block";
        setTimeout(() => t.style.display = "none", 3000);
    }
</script>

</body>
</html>
