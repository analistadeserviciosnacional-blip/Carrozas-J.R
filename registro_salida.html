<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.R. — Registro de Salida Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --azul-principal: #004a99; --azul-cielo: #e3f2fd; 
            --blanco: #ffffff; --gris-texto: #546e7a; --verde-wa: #25D366;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--azul-cielo); font-family: 'DM Sans', sans-serif; color: var(--azul-principal); padding: 10px; }
        .container { max-width: 650px; margin: 0 auto; background: var(--blanco); border-radius: 20px; box-shadow: 0 10px 25px rgba(0,74,153,0.1); overflow: hidden; }
        .header { background: var(--azul-principal); color: var(--blanco); padding: 20px; text-align: center; position: relative; }
        .btn-volver { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.2); color: white; border: none; padding: 8px 14px; border-radius: 10px; font-weight: bold; font-size: 12px; cursor: pointer; }
        .content { padding: 20px; }
        .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--gris-texto); margin: 20px 0 10px; border-bottom: 2px solid var(--azul-cielo); padding-bottom: 5px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: var(--azul-cielo); }
        label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 5px; color: var(--azul-principal); text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 12px; border: 2px solid var(--azul-cielo); border-radius: 10px; font-family: inherit; color: var(--azul-principal); background: #f8fbff; font-size: 14px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .upload-container { border: 2px dashed var(--azul-principal); border-radius: 15px; padding: 15px; text-align: center; background: #f0f7ff; cursor: pointer; margin-bottom: 12px; }
        .preview-gallery { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
        .thumb-wrap { position: relative; width: 100%; aspect-ratio: 1/1; }
        .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 1px solid var(--azul-cielo); }
        .btn-del { position: absolute; top: -5px; right: -5px; background: #ff4444; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        canvas { border: 2px dashed var(--azul-cielo); border-radius: 12px; width: 100%; height: 140px; background: #fff; touch-action: none; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 10px; }
        .btn-save { background: var(--azul-principal); color: white; }
        .btn-wa { background: var(--verde-wa); color: white; display: none; text-decoration: none; text-align: center; line-height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <button class="btn-volver" onclick="irAtras()">← VOLVER</button>
        <h2 id="saludo">CARGANDO PERFIL...</h2>
        <p id="rol-info" style="font-size: 11px; opacity: 0.8; font-weight: bold;"></p>
    </div>

    <div class="content">
        <div class="section-title">Datos de Responsable</div>
        <div class="grid-2">
            <div>
                <label>Conductor</label>
                <input type="text" id="conductor" readonly style="background: #eef5ff; font-weight: bold;">
            </div>
            <div>
                <label>Regional</label>
                <select id="regional">
                    <option value="Pereira">Pereira</option>
                    <option value="Armenia">Armenia</option>
                    <option value="Manizales">Manizales</option>
                    <option value="Cali">Cali</option>
                </select>
            </div>
        </div>

        <div class="section-title">Información del Vehículo</div>
        <div class="grid-2">
            <div>
                <label>Placa Vehículo</label>
                <select id="placa">
                    <option value="">Cargando flota...</option>
                </select>
            </div>
            <div>
                <label>Motivo Salida</label>
                <select id="motivo">
                    <option value="Servicio Funerario">Servicio Funerario</option>
                    <option value="Traslado Nacional">Traslado Nacional</option>
                    <option value="Recogida Clínica">Recogida Clínica</option>
                    <option value="Mantenimiento">Mantenimiento</option>
                </select>
            </div>
        </div>

        <div class="section-title">Datos del Servicio</div>
        <label>Nombre del Fallecido</label>
        <input type="text" id="fallecido" placeholder="Nombre completo">

        <div class="grid-2">
            <div><label>Lugar de Recogida</label><input type="text" id="clinica" placeholder="Clínica/Hosp/RSD"></div>
            <div><label>N° Prestación</label><input type="text" id="prestacion" placeholder="Código"></div>
        </div>

        <div class="grid-2">
            <div><label>Origen (Ciudad)</label><input type="text" id="origen" placeholder="De:"></div>
            <div><label>Destino (Ciudad)</label><input type="text" id="destino" placeholder="Para:"></div>
        </div>

        <div class="section-title">Control de Kilometraje y Hora</div>
        <div class="grid-2">
            <div><label>Hora Salida</label><input type="time" id="hora_salida"></div>
            <div><label>Hora Ingreso</label><input type="time" id="hora_ingreso"></div>
        </div>
        <div class="grid-2">
            <div><label>KM Salida</label><input type="number" id="km_s" oninput="calcularTotal()"></div>
            <div><label>KM Ingreso</label><input type="number" id="km_i" oninput="calcularTotal()"></div>
        </div>
        <label>Total KM Recorridos</label>
        <input type="number" id="total_km" readonly style="background: #eef5ff; font-weight: bold; font-size: 16px;">

        <div class="section-title">Evidencias Fotográficas</div>
        <div class="upload-container" onclick="document.getElementById('fotos-input').click()">
            <span id="upload-text">📸 Toca para subir fotos (Máximo 4)</span>
            <input type="file" id="fotos-input" accept="image/*" multiple hidden onchange="procesarFotos(this)">
        </div>
        <div class="preview-gallery" id="galeria"></div>

        <label>Observaciones de Salida</label>
        <textarea id="observaciones" rows="2" placeholder="Novedades del vehículo o servicio..."></textarea>

        <div class="section-title">Firma de Responsable</div>
        <canvas id="canvas"></canvas>
        <p onclick="borrarFirma()" style="text-align: right; color: #ff4444; font-size: 11px; cursor: pointer; margin-top: 5px; font-weight: bold;">✖ BORRAR FIRMA</p>

        <div class="section-title">Notificación</div>
        <label>Seleccionar Coordinador</label>
        <select id="select-coordinador">
            <option value="3001234567" data-nombre="Coordinador Pereira">Coordinador Pereira</option>
            <option value="3110000000" data-nombre="Logística J.R.">Logística J.R.</option>
        </select>

        <button class="btn btn-save" id="btn-envio" onclick="guardarTodo()">1. GUARDAR EN SISTEMA</button>
        <button class="btn btn-wa" id="btn-wa" onclick="enviarWA()">2. ENVIAR POR WHATSAPP</button>
    </div>
</div>

<script src="db.js"></script>
<script>
    let fotosArray = [];
    let datosFinales = {};
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let dibujando = false;

    window.onload = async () => {
        const sesionData = localStorage.getItem('usuario_data');
        if (!sesionData) { window.location.href = "index.html"; return; }
        
        const user = JSON.parse(sesionData);
        document.getElementById('conductor').value = user.nombre;
        document.getElementById('saludo').innerText = "¡HOLA, " + user.nombre.split(' ')[0].toUpperCase() + "!";
        
        const esAdmin = user.usuario.toLowerCase() === 'admin';
        document.getElementById('rol-info').innerText = "SESIÓN ACTIVA: " + (esAdmin ? "ADMINISTRADOR" : "CONDUCTOR");

        await cargarPlacas();

        const now = new Date();
        document.getElementById('hora_salida').value = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    };

    async function cargarPlacas() {
        const select = document.getElementById('placa');
        try {
            const res = await DB.obtenerFlota();
            if (res.ok) {
                select.innerHTML = '<option value="">Seleccione placa...</option>';
                res.data.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = c.placa;
                    opt.textContent = `${c.placa} (${c.tipo})`;
                    select.appendChild(opt);
                });
            }
        } catch (e) { select.innerHTML = '<option>Error al cargar placas</option>'; }
    }

    function irAtras() {
        const sesionData = localStorage.getItem('usuario_data');
        if (!sesionData) { window.location.href = "index.html"; return; }
        const user = JSON.parse(sesionData);
        window.location.href = (user.usuario.toLowerCase() === 'admin') ? "dashboard.html" : "panel_conductor.html";
    }

    function procesarFotos(input) {
        const archivos = Array.from(input.files);
        archivos.forEach(f => {
            if (fotosArray.length < 4) {
                const reader = new FileReader();
                reader.onload = (e) => { fotosArray.push(e.target.result); renderGaleria(); };
                reader.readAsDataURL(f);
            }
        });
    }

    function renderGaleria() {
        const g = document.getElementById('galeria');
        g.innerHTML = fotosArray.map((img, i) => `
            <div class="thumb-wrap">
                <img src="${img}">
                <button class="btn-del" onclick="eliminarFoto(${i})">×</button>
            </div>`).join('');
        document.getElementById('upload-text').innerText = `📸 ${fotosArray.length} de 4 fotos`;
    }

    function eliminarFoto(i) { fotosArray.splice(i, 1); renderGaleria(); }

    const obtenerPos = e => {
        const rect = canvas.getBoundingClientRect();
        return { x: (e.clientX || e.touches[0].clientX) - rect.left, y: (e.clientY || e.touches[0].clientY) - rect.top };
    };
    const iniciar = e => { dibujando = true; ctx.beginPath(); const p = obtenerPos(e); ctx.moveTo(p.x, p.y); };
    const mover = e => { if(!dibujando) return; e.preventDefault(); const p = obtenerPos(e); ctx.lineTo(p.x, p.y); ctx.strokeStyle = "#004a99"; ctx.lineWidth = 2; ctx.stroke(); };
    canvas.addEventListener('mousedown', iniciar); canvas.addEventListener('mousemove', mover);
    window.addEventListener('mouseup', () => dibujando = false);
    canvas.addEventListener('touchstart', iniciar); canvas.addEventListener('touchmove', mover);
    function borrarFirma() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    function calcularTotal() {
        const s = parseFloat(document.getElementById('km_s').value) || 0;
        const i = parseFloat(document.getElementById('km_i').value) || 0;
        document.getElementById('total_km').value = (i - s).toFixed(1);
    }

    async function guardarTodo() {
        const btn = document.getElementById('btn-envio');
        const selCoord = document.getElementById('select-coordinador');
        
        if(!document.getElementById('placa').value) { alert("Selecciona una placa"); return; }

        btn.innerText = "⏳ GUARDANDO..."; btn.disabled = true;

        datosFinales = {
            regional: document.getElementById('regional').value,
            conductor: document.getElementById('conductor').value,
            placa: document.getElementById('placa').value,
            motivo: document.getElementById('motivo').value,
            fallecido: document.getElementById('fallecido').value,
            clinica: document.getElementById('clinica').value,
            prestacion: document.getElementById('prestacion').value,
            origen: document.getElementById('origen').value,
            destino: document.getElementById('destino').value,
            hora_salida: document.getElementById('hora_salida').value,
            hora_ingreso: document.getElementById('hora_ingreso').value,
            km_salida: document.getElementById('km_s').value,
            km_ingreso: document.getElementById('km_i').value,
            total_km: document.getElementById('total_km').value,
            coordinador: selCoord.options[selCoord.selectedIndex].getAttribute('data-nombre'),
            observaciones: document.getElementById('observaciones').value,
            imagen1: fotosArray[0] || "",
            imagen2: fotosArray[1] || "",
            imagen3: fotosArray[2] || "",
            imagen4: fotosArray[3] || "",
            firma: canvas.toDataURL()
        };

        const res = await DB.guardarTraslado(datosFinales);
        if (res.ok) {
            btn.innerText = "✓ GUARDADO EXITOSO";
            btn.style.background = "#25D366";
            document.getElementById('btn-wa').style.display = "block";
        } else {
            alert("Error: " + res.error);
            btn.disabled = false;
            btn.innerText = "REINTENTAR";
        }
    }

    function enviarWA() {
        const num = document.getElementById('select-coordinador').value;
        const saludo = new Date().getHours() < 12 ? "Buenos días ☀️" : "Buenas tardes 🌤️";
        
        const msg = `${saludo}\n\n` +
            `📢 *Reporte de Salida De Carroza*\n\n` +
            `📍 *Regional:* ${datosFinales.regional}\n` +
            `📅 *Fecha:* ${new Date().toLocaleDateString()}\n` +
            `👤 *Coordinador:* ${datosFinales.coordinador}\n` +
            `🕒 *Hora De Salida:* ${datosFinales.hora_salida}\n` +
            `🚗 *Placas Del Vehiculo:* ${datosFinales.placa}\n` +
            `❓ *Motivo De Salida:* ${datosFinales.motivo}\n` +
            `⚱️ *Nombre Del Fallecido:* ${datosFinales.fallecido || '---'}\n` +
            `🏥 *Lugar de Recogida:* ${datosFinales.clinica || '---'}\n` +
            `🚩 *Origen:* ${datosFinales.origen || '---'}\n` +
            `🏁 *Destino:* ${datosFinales.destino || '---'}\n` +
            `📊 *Km De Salida:* ${datosFinales.km_salida}\n` +
            `📊 *Km De Ingreso:* ${datosFinales.km_ingreso}\n` +
            `🛣️ *Total Recorrido:* ${datosFinales.total_km} KM\n` +
            `👨🏻‍✈️ *Nom. Conductor:* ${datosFinales.conductor}\n\n` +
            `📝 *Observaciones:* ${datosFinales.observaciones || 'Sin novedades'}\n\n` +
            `✅ *La Carroza se Encuentra:* Todo En Orden 👍🏻`;

        window.open(`https://wa.me/57${num}?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>
</body>
</html>
