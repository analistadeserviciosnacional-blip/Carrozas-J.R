<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.R. - Registro de Salida</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --azul: #003366; --verde: #25D366; --gris: #f4f4f4; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--gris); padding: 10px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        .section { background: var(--azul); color: white; padding: 10px; margin: 20px 0 10px; border-radius: 8px; font-weight: bold; text-align: center; }
        label { display: block; margin-top: 12px; font-weight: bold; font-size: 14px; color: #333; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-save { width: 100%; padding: 15px; background: var(--azul); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-whatsapp { width: 100%; padding: 15px; background: var(--verde); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; display: none; text-decoration: none; text-align: center; }
        canvas { border: 2px dashed #ccc; width: 100%; height: 180px; border-radius: 10px; background: #fff; touch-action: none; margin-top: 5px; }
        .foto-input { background: #fff; margin-bottom: 10px; border: 1px solid var(--azul); }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:var(--azul); text-align:center; margin-top:0;">Registro de Traslado J.R.</h2>
    
    <label>Regional</label>
    <select id="regional">
        <option value="Pereira">Pereira</option>
        <option value="Armenia">Armenia</option>
        <option value="Manizales">Manizales</option>
        <option value="Cali">Cali</option>
    </select>

    <label>Conductor</label>
    <input type="text" id="conductor" placeholder="Nombre completo">

    <label>Placa del Vehículo</label>
    <input type="text" id="placa" placeholder="Ej: ABC-123">

    <div class="section">DATOS DEL SERVICIO</div>
    
    <label>Nombre del Fallecido</label>
    <input type="text" id="fallecido">
    
    <label>Destino</label>
    <input type="text" id="destino">

    <div class="section">KILOMETRAJE</div>
    
    <div style="display:flex; gap:10px">
        <div style="flex:1"><label>KM Salida</label><input type="number" id="km_s" oninput="calcularTotal()"></div>
        <div style="flex:1"><label>KM Ingreso</label><input type="number" id="km_i" oninput="calcularTotal()"></div>
    </div>
    <label>Total Recorrido (KM)</label>
    <input type="number" id="total_km" readonly style="background:#eee;">

    <div class="section">EVIDENCIAS (4 FOTOS)</div>
    <label>1. Foto Salida/Inicio</label>
    <input type="file" id="foto1" accept="image/*" capture="camera" class="foto-input">
    <label>2. Foto Documento/Orden</label>
    <input type="file" id="foto2" accept="image/*" capture="camera" class="foto-input">
    <label>3. Foto Destino/Llegada</label>
    <input type="file" id="foto3" accept="image/*" capture="camera" class="foto-input">
    <label>4. Foto Adicional/Kilometraje</label>
    <input type="file" id="foto4" accept="image/*" capture="camera" class="foto-input">

    <div class="section">FIRMA DE RESPONSABLE</div>
    <canvas id="canvas"></canvas>
    <button onclick="clearCanvas()" style="background:none; border:none; color:red; font-size:13px; cursor:pointer; width:100%; text-align:right;">✖ Borrar Firma</button>

    <div class="section" style="background:#25D366">NOTIFICACIÓN</div>
    <label>Enviar reporte a:</label>
    <select id="select-coordinador" style="border: 2px solid var(--verde);">
        <option value="573001234567">Coordinador Pereira (Ejemplo)</option>
        <option value="573000000000">Coordinador Armenia (Ejemplo)</option>
        <option value="573111111111">Central de Logística</option>
    </select>

    <button class="btn-save" id="btn-envio" onclick="enviarDatos()">1. GUARDAR EN SISTEMA</button>
    <button class="btn-whatsapp" id="btn-whatsapp" onclick="enviarWhatsApp()">2. ENVIAR POR WHATSAPP</button>
</div>

<script src="db.js"></script>
<script>
    // --- LÓGICA DEL CANVAS (FIRMA) ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: (e.clientX || e.touches[0].clientX) - rect.left,
            y: (e.clientY || e.touches[0].clientY) - rect.top
        };
    }

    function start(e) { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); }
    function stop() { drawing = false; }
    function move(e) {
        if (!drawing) return;
        e.preventDefault();
        const p = getPos(e);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
    }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    window.addEventListener('mouseup', stop);
    canvas.addEventListener('touchstart', start);
    canvas.addEventListener('touchmove', move);
    canvas.addEventListener('touchend', stop);

    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    // --- CÁLCULO DE KM ---
    function calcularTotal() {
        const s = parseFloat(document.getElementById('km_s').value) || 0;
        const i = parseFloat(document.getElementById('km_i').value) || 0;
        document.getElementById('total_km').value = (i - s).toFixed(1);
    }

    // --- CONVERSIÓN DE FOTOS ---
    const toBase64 = file => new Promise((resolve) => {
        if (!file) return resolve("");
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
    });

    let reporteCache = {};

    // --- FUNCIÓN PRINCIPAL GUARDAR ---
    async function enviarDatos() {
        const btn = document.getElementById('btn-envio');
        btn.disabled = true;
        btn.innerText = "⏳ Subiendo reporte...";

        try {
            reporteCache = {
                regional: document.getElementById('regional').value,
                conductor: document.getElementById('conductor').value,
                placa: document.getElementById('placa').value,
                fallecido: document.getElementById('fallecido').value,
                destino: document.getElementById('destino').value,
                km_salida: document.getElementById('km_s').value,
                km_ingreso: document.getElementById('km_i').value,
                total_km: document.getElementById('total_km').value,
                imagen1: await toBase64(document.getElementById('foto1').files[0]),
                imagen2: await toBase64(document.getElementById('foto2').files[0]),
                imagen3: await toBase64(document.getElementById('foto3').files[0]),
                imagen4: await toBase64(document.getElementById('foto4').files[0]),
                firma: canvas.toDataURL()
            };

            const res = await DB.guardarTraslado(reporteCache);
            
            if (res.ok) {
                alert("✅ Guardado exitosamente en la base de datos.");
                btn.innerText = "✓ REGISTRADO";
                document.getElementById('btn-whatsapp').style.display = "block";
            } else {
                throw res.error;
            }
        } catch (err) {
            alert("❌ Error: " + err.message);
            btn.disabled = false;
            btn.innerText = "REINTENTAR GUARDAR";
        }
    }

    // --- FUNCIÓN WHATSAPP ---
    function enviarWhatsApp() {
        const num = document.getElementById('select-coordinador').value;
        const texto = `*REPORTE TRASLADO J.R.*\n\n` +
                      `*Conductor:* ${reporteCache.conductor}\n` +
                      `*Placa:* ${reporteCache.placa}\n` +
                      `*Fallecido:* ${reporteCache.fallecido}\n` +
                      `*Destino:* ${reporteCache.destino}\n` +
                      `*Ruta:* ${reporteCache.km_salida} KM a ${reporteCache.km_ingreso} KM\n` +
                      `*Total:* ${reporteCache.total_km} KM\n\n` +
                      `_Soportes y firma registrados en Supabase._`;

        const win = window.open(`https://api.whatsapp.com/send?phone=${num}&text=${encodeURIComponent(texto)}`, '_blank');
        if (win) win.focus();
    }
</script>

</body>
</html>
