<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.R. — Registro de Salida Completo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --azul-principal: #004a99; --azul-cielo: #e3f2fd; 
            --blanco: #ffffff; --gris-texto: #546e7a; --verde-wa: #25D366;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--azul-cielo); font-family: 'DM Sans', sans-serif; color: var(--azul-principal); padding: 10px; }
        .container { max-width: 650px; margin: 0 auto; background: var(--blanco); border-radius: 20px; box-shadow: 0 10px 25px rgba(0,74,153,0.1); overflow: hidden; }
        .header { background: var(--azul-principal); color: var(--blanco); padding: 20px; text-align: center; }
        .content { padding: 20px; }
        .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--gris-texto); margin: 20px 0 10px; border-bottom: 2px solid var(--azul-cielo); padding-bottom: 5px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: var(--azul-cielo); }
        
        label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 5px; color: var(--azul-principal); text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 12px; border: 2px solid var(--azul-cielo); border-radius: 10px; font-family: inherit; color: var(--azul-principal); background: #f8fbff; font-size: 14px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        /* GALERÍA UNIFICADA */
        .upload-container { border: 2px dashed var(--azul-principal); border-radius: 15px; padding: 15px; text-align: center; background: #f0f7ff; cursor: pointer; margin-bottom: 12px; }
        .preview-gallery { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
        .thumb-wrap { position: relative; width: 100%; aspect-ratio: 1/1; }
        .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 1px solid var(--azul-cielo); }
        .btn-del { position: absolute; top: -5px; right: -5px; background: #ff4444; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        canvas { border: 2px dashed var(--azul-cielo); border-radius: 12px; width: 100%; height: 140px; background: #fff; touch-action: none; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 10px; }
        .btn-save { background: var(--azul-principal); color: white; }
        .btn-wa { background: var(--verde-wa); color: white; display: none; text-decoration: none; text-align: center; line-height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 id="saludo">Cargando perfil...</h2>
        <p style="font-size: 12px; opacity: 0.8;">Sistema de Gestión J.R. — Registro de Salida</p>
    </div>

    <div class="content">
        <div class="section-title">Personal y Ubicación</div>
        <div class="grid-2">
            <div>
                <label>Usuario Activo</label>
                <input type="text" id="conductor" readonly style="background: #eef5ff; color: #003366; font-weight: bold;">
            </div>
            <div>
                <label>Regional</label>
                <select id="regional">
                    <option value="Pereira">Pereira</option>
                    <option value="Armenia">Armenia</option>
                    <option value="Manizales">Manizales</option>
                    <option value="Cali">Cali</option>
                </select>
            </div>
        </div>

        <div class="section-title">Datos del Vehículo</div>
        <div class="grid-2">
            <div>
                <label>Placa</label>
                <input type="text" id="placa" placeholder="Ej: ABC-123">
            </div>
            <div>
                <label>Motivo</label>
                <select id="motivo">
                    <option value="Servicio Funerario">Servicio Funerario</option>
                    <option value="Traslado Nacional">Traslado Nacional</option>
                    <option value="Recogida Clínica">Recogida Clínica</option>
                    <option value="Mantenimiento">Mantenimiento</option>
                </select>
            </div>
        </div>

        <div class="section-title">Información del Servicio</div>
        <label>Nombre del Fallecido</label>
        <input type="text" id="fallecido" placeholder="Nombre completo">

        <div class="grid-2">
            <div>
                <label>Clínica / Origen</label>
                <input type="text" id="clinica" placeholder="Lugar de recogida">
            </div>
            <div>
                <label>N° Prestación</label>
                <input type="text" id="prestacion" placeholder="Código">
            </div>
        </div>

        <div class="grid-2">
            <div><label>Origen (Ciudad)</label><input type="text" id="origen" placeholder="Ciudad"></div>
            <div><label>Destino (Ciudad)</label><input type="text" id="destino" placeholder="Ciudad"></div>
        </div>

        <div class="section-title">Control de Kilometraje y Tiempos</div>
        <div class="grid-2">
            <div><label>Hora Salida</label><input type="time" id="hora_salida"></div>
            <div><label>Hora Ingreso</label><input type="time" id="hora_ingreso"></div>
        </div>
        <div class="grid-2">
            <div><label>KM Salida</label><input type="number" id="km_s" oninput="calcularTotal()"></div>
            <div><label>KM Ingreso</label><input type="number" id="km_i" oninput="calcularTotal()"></div>
        </div>
        <label>Total Recorrido (KM)</label>
        <input type="number" id="total_km" readonly style="background: #eef5ff; font-weight: bold; font-size: 16px;">

        <div class="section-title">Evidencias Fotográficas</div>
        <div class="upload-container" onclick="document.getElementById('fotos-input').click()">
            <span id="upload-text">📸 Toque aquí para subir fotos (Máx 4)</span>
            <input type="file" id="fotos-input" accept="image/*" multiple hidden onchange="procesarFotos(this)">
        </div>
        <div class="preview-gallery" id="galeria"></div>

        <label>Observaciones</label>
        <textarea id="observaciones" rows="2" placeholder="Notas adicionales..."></textarea>

        <div class="section-title">Firma Autorizada</div>
        <canvas id="canvas"></canvas>
        <p onclick="borrarFirma()" style="text-align: right; color: #ff4444; font-size: 11px; cursor: pointer; margin-top: 5px; font-weight: bold;">✖ BORRAR FIRMA</p>

        <label style="margin-top:15px">Notificar WhatsApp a:</label>
        <select id="select-coordinador" style="border: 2px solid var(--verde-wa);">
            <option value="573001234567">Coordinador Pereira</option>
            <option value="573110000000">Logística Central</option>
        </select>

        <button class="btn btn-save" id="btn-envio" onclick="guardarTodo()">1. GUARDAR REGISTRO</button>
        <button class="btn btn-wa" id="btn-wa" onclick="enviarWA()">2. ENVIAR POR WHATSAPP</button>
    </div>
</div>

<script src="db.js"></script>
<script>
    // --- LÓGICA DE IDENTIFICACIÓN CORREGIDA ---
    window.onload = () => {
        // Buscamos el nombre en las llaves que usa tu sistema
        const nombreLocal = localStorage.getItem('nombre');
        const usuarioObjeto = JSON.parse(localStorage.getItem('usuario') || "{}");
        
        // Prioridad: 1. Objeto usuario.nombre | 2. Llave 'nombre' | 3. 'Admin J.R.' por defecto
        const nombreFinal = usuarioObjeto.nombre || nombreLocal || "Usuario J.R.";
        
        document.getElementById('conductor').value = nombreFinal;
        document.getElementById('saludo').innerText = "HOLA, " + nombreFinal.split(' ')[0].toUpperCase();
        
        // Hora actual por defecto
        const now = new Date();
        document.getElementById('hora_salida').value = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
    };

    // --- RESTO DE LA LÓGICA ---
    let fotosArray = [];
    async function procesarFotos(input) {
        const archivos = Array.from(input.files);
        for (let f of archivos) {
            if (fotosArray.length < 4) {
                const reader = new FileReader();
                reader.readAsDataURL(f);
                reader.onload = (e) => {
                    fotosArray.push(e.target.result);
                    renderGaleria();
                };
            }
        }
    }

    function renderGaleria() {
        const g = document.getElementById('galeria');
        g.innerHTML = "";
        fotosArray.forEach((img, i) => {
            g.innerHTML += `<div class="thumb-wrap"><img src="${img}"><button class="btn-del" onclick="eliminarFoto(${i})">×</button></div>`;
        });
        document.getElementById('upload-text').innerText = `📸 ${fotosArray.length} de 4 fotos cargadas`;
    }

    function eliminarFoto(i) { fotosArray.splice(i, 1); renderGaleria(); }

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let dibujando = false;
    const obtenerPos = e => {
        const rect = canvas.getBoundingClientRect();
        return { x: (e.clientX || e.touches[0].clientX) - rect.left, y: (e.clientY || e.touches[0].clientY) - rect.top };
    };
    const iniciar = e => { dibujando = true; ctx.beginPath(); const p = obtenerPos(e); ctx.moveTo(p.x, p.y); };
    const mover = e => { if(!dibujando) return; e.preventDefault(); const p = obtenerPos(e); ctx.lineTo(p.x, p.y); ctx.strokeStyle = "#004a99"; ctx.lineWidth=2; ctx.stroke(); };
    canvas.addEventListener('mousedown', iniciar); canvas.addEventListener('mousemove', mover);
    window.addEventListener('mouseup', () => dibujando = false);
    canvas.addEventListener('touchstart', iniciar); canvas.addEventListener('touchmove', mover);
    canvas.addEventListener('touchend', () => dibujando = false);
    function borrarFirma() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    function calcularTotal() {
        const s = parseFloat(document.getElementById('km_s').value) || 0;
        const i = parseFloat(document.getElementById('km_i').value) || 0;
        document.getElementById('total_km').value = (i - s).toFixed(1);
    }

    let datosFinales = {};
    async function guardarTodo() {
        const btn = document.getElementById('btn-envio');
        btn.innerText = "⏳ PROCESANDO..."; btn.disabled = true;

        datosFinales = {
            fecha: new Date().toLocaleDateString(),
            regional: document.getElementById('regional').value,
            conductor: document.getElementById('conductor').value,
            placa: document.getElementById('placa').value,
            motivo: document.getElementById('motivo').value,
            fallecido: document.getElementById('fallecido').value,
            clinica: document.getElementById('clinica').value,
            prestacion: document.getElementById('prestacion').value,
            origen: document.getElementById('origen').value,
            destino: document.getElementById('destino').value,
            hora_salida: document.getElementById('hora_salida').value,
            hora_ingreso: document.getElementById('hora_ingreso').value,
            km_salida: document.getElementById('km_s').value,
            km_ingreso: document.getElementById('km_i').value,
            total_km: document.getElementById('total_km').value,
            observaciones: document.getElementById('observaciones').value,
            imagen1: fotosArray[0] || "",
            imagen2: fotosArray[1] || "",
            imagen3: fotosArray[2] || "",
            imagen4: fotosArray[3] || "",
            firma: canvas.toDataURL()
        };

        const res = await DB.guardarTraslado(datosFinales);
        if(res.ok) {
            btn.innerText = "✓ REGISTRO EXITOSO";
            document.getElementById('btn-wa').style.display = "block";
        } else {
            alert("Error: " + res.error.message); btn.disabled = false; btn.innerText = "REINTENTAR";
        }
    }

    function enviarWA() {
        const num = document.getElementById('select-coordinador').value;
        const msg = `*REPORTE J.R.*\n` +
                    `*Responsable:* ${datosFinales.conductor}\n` +
                    `*Servicio:* ${datosFinales.fallecido}\n` +
                    `*Placa:* ${datosFinales.placa}\n` +
                    `*Ruta:* ${datosFinales.origen} -> ${datosFinales.destino}\n` +
                    `*KM:* ${datosFinales.total_km} km recorridos.`;
        window.open(`https://api.whatsapp.com/send?phone=${num}&text=${encodeURIComponent(msg)}`);
    }
</script>
</body>
</html>
