<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.R. — Panel Coordinador</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Paleta de colores basada en el diseño del conductor */
        :root { 
            --azul: #001a70; 
            --celeste: #e8f0fe; 
            --blanco: #ffffff; 
            --verde: #10b981; 
            --naranja: #f59e0b; 
            --rojo: #ef4444; 
            --gris: #64748b; 
            --fondo: #f0f7ff; /* Fondo azul muy claro */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 15px; }

        /* Header similar al de conductor */
        .header-top {
            background: var(--blanco);
            border-radius: 15px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            margin-bottom: 25px;
        }
        .header-logo { font-size: 16px; font-weight: 800; color: var(--azul); text-transform: uppercase; }
        .btn-salir { background: #fee2e2; border: none; color: var(--rojo); padding: 8px 18px; border-radius: 10px; font-size: 11px; font-weight: 800; cursor: pointer; }

        /* Saludo */
        .welcome { text-align: center; margin-bottom: 30px; }
        .welcome h1 { font-size: 26px; font-weight: 800; color: var(--azul); }
        .welcome p { font-size: 13px; color: var(--gris); margin-top: 5px; font-weight: 500; }
        .regional-tag { display: inline-block; background: var(--celeste); color: var(--azul); font-size: 11px; font-weight: 800; padding: 5px 15px; border-radius: 20px; margin-top: 10px; }

        /* Tarjeta principal (Igual a "Mi carroza asignada") */
        .main-card {
            background: var(--blanco);
            border-radius: 25px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,26,112,0.04);
            margin-bottom: 20px;
        }
        .main-card i { font-size: 40px; display: block; margin-bottom: 15px; }
        .main-card .label { font-size: 13px; color: var(--gris); margin-bottom: 15px; display: block; }
        .btn-principal {
            background: var(--azul);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            text-decoration: none;
            display: inline-block;
        }

        /* Grid de iconos (Misma estructura que el panel conductor) */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .menu-item {
            background: var(--blanco);
            border-radius: 25px;
            padding: 25px 15px;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 2px solid transparent;
            transition: 0.2s;
        }
        .menu-item:active { transform: scale(0.96); }
        .menu-item i { font-size: 32px; margin-bottom: 10px; font-style: normal; }
        .menu-item span { font-size: 11px; font-weight: 800; color: var(--azul); text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Estilo especial para Solicitudes de Apoyo (Borde verde y Badge rojo como en la imagen) */
        .item-apoyo { border-color: #10b98166; }
        .badge-rojo {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--rojo);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 800;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.4);
        }

        /* Secciones de listas (Mis Salidas Recientes) */
        .section-box { margin-bottom: 25px; }
        .section-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 10px 12px;
        }
        .section-header h2 { font-size: 13px; font-weight: 800; color: var(--azul); text-transform: uppercase; }
        .btn-ver-todo { background: var(--celeste); color: var(--azul); padding: 5px 12px; border-radius: 8px; font-size: 10px; font-weight: 700; text-decoration: none; }

        .list-container { background: var(--blanco); border-radius: 0 0 20px 20px; overflow: hidden; }
        
        /* Filas de la lista */
        .list-row {
            padding: 15px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .row-main { flex: 1; }
        .row-title { font-size: 13px; font-weight: 800; color: #1e293b; margin-bottom: 2px; }
        .row-sub { font-size: 11px; color: var(--gris); }
        .row-tag { 
            background: #f1f5f9; 
            padding: 4px 10px; 
            border-radius: 6px; 
            font-size: 10px; 
            font-weight: 800; 
            color: var(--azul);
            text-transform: uppercase;
        }

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 12px 25px; border-radius: 12px; font-size: 13px; z-index: 1000; display: none; }
    </style>
</head>
<body>

<div class="header-top">
    <div class="header-logo">J.R. Coordinación</div>
    <button class="btn-salir" onclick="cerrarSesion()">SALIR</button>
</div>

<div class="welcome">
    <h1 id="txt-nombre">Hola...</h1>
    <p>Panel de Servicios y Reportes</p>
    <div class="regional-tag" id="txt-regional">📍 Cargando...</div>
</div>

<!-- Acción Principal (Crear) -->
<div class="main-card">
    <i>📤</i>
    <span class="label">Nueva solicitud de apoyo</span>
    <a href="crear_apoyo.html" class="btn-principal">+ Crear Solicitud</a>
</div>

<!-- Menú de Iconos (Igual al de conductor) -->
<div class="menu-grid">
    <a href="solicitud_apoyo.html" class="menu-item item-apoyo" id="card-ver-apoyos">
        <div class="badge-rojo" id="badge-apoyos" style="display:none;">0</div>
        <i>🤝</i>
        <span>Ver Apoyos</span>
    </a>
    <a href="registro_llegada.html" class="menu-item">
        <i>🏁</i>
        <span>Llegadas</span>
    </a>
    <a href="taller.html" class="menu-item">
        <i>🔧</i>
        <span>Taller</span>
    </a>
    <a href="flota.html" class="menu-item">
        <i>🚗</i>
        <span>Gestión Flota</span>
    </a>
    <a href="reporte_averia.html" class="menu-item" style="grid-column: span 2;">
        <i>⚠️</i>
        <span>Reportar Avería</span>
    </a>
</div>

<!-- Listas Inferiores -->
<div class="section-box">
    <div class="section-header">
        <h2>Mis Solicitudes</h2>
        <a href="solicitud_apoyo.html" class="btn-ver-todo">VER TODO</a>
    </div>
    <div class="list-container" id="lista-apoyos">
        <div style="padding:20px; text-align:center; color:#94a3b8; font-size:12px;">Cargando...</div>
    </div>
</div>

<div class="section-box">
    <div class="section-header">
        <h2>Traslados Recientes</h2>
        <a href="dashboard.html" class="btn-ver-todo">PANEL ADMIN</a>
    </div>
    <div class="list-container" id="lista-traslados">
        <div style="padding:20px; text-align:center; color:#94a3b8; font-size:12px;">Cargando...</div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="db.js"></script>
<script>
    let sesion  = {};
    let regional = 'Pereira';

    const norm = s => (s||'').toLowerCase().trim()
        .normalize('NFD').replace(/[\u0300-\u036f]/g,'');

    window.onload = async () => {
        sesion = JSON.parse(localStorage.getItem('usuario_sesion') || 'null');
        if (!sesion) { window.location.href = 'index.html'; return; }

        const rol = norm(sesion.rol);
        const usr = norm(sesion.usuario);

        if (rol === 'admin' || rol === 'administracion' || usr === 'admin') { 
            window.location.href = 'dashboard.html'; return; 
        }
        if (rol !== 'coordinador') { 
            window.location.href = 'panel_conductor.html'; return; 
        }

        regional = sesion.regional || 'Pereira';
        let nombreMostrar = (sesion.nombre || '').replace(/^coordinador\s+/i, '').split(' ')[0];

        document.getElementById('txt-nombre').textContent   = 'Hola, ' + nombreMostrar;
        document.getElementById('txt-regional').textContent = '📍 ' + regional;

        await Promise.all([cargarMisApoyos(), cargarTraslados()]);
        setInterval(cargarMisApoyos, 30000);
    };

    async function cargarMisApoyos() {
        try {
            const { data } = await DB.supabase
                .from('solicitud_apoyo')
                .select('*')
                .eq('coordinador', sesion.nombre)
                .order('created_at', { ascending: false }).limit(3);

            const { data: pendientes } = await DB.supabase
                .from('solicitud_apoyo').select('id').eq('estado', 'pendiente');

            const badge = document.getElementById('badge-apoyos');
            if (pendientes && pendientes.length > 0) {
                badge.style.display = 'flex';
                badge.textContent = pendientes.length;
            }

            const div = document.getElementById('lista-apoyos');
            if (!data || data.length === 0) {
                div.innerHTML = '<div style="padding:20px; text-align:center; font-size:12px; color:#94a3b8;">Sin solicitudes</div>';
                return;
            }
            div.innerHTML = data.map(s => `
                <div class="list-row">
                    <div class="row-main">
                        <div class="row-title">${s.origen} ➔ ${s.destino}</div>
                        <div class="row-sub">${s.tipo_servicio}</div>
                    </div>
                    <div class="row-tag">${s.estado}</div>
                </div>
            `).join('');
        } catch(e) { console.error(e); }
    }

    async function cargarTraslados() {
        try {
            const { data } = await DB.supabase
                .from('Traslado').select('placa, conductor, origen, destino')
                .eq('regional', regional).order('id_salida', { ascending: false }).limit(3);

            const div = document.getElementById('lista-traslados');
            if (!data || data.length === 0) {
                div.innerHTML = '<div style="padding:20px; text-align:center; font-size:12px; color:#94a3b8;">Sin traslados hoy</div>';
                return;
            }
            div.innerHTML = data.map(t => `
                <div class="list-row">
                    <div class="row-main">
                        <div class="row-title">${t.placa} · ${t.conductor}</div>
                        <div class="row-sub">${t.origen} a ${t.destino}</div>
                    </div>
                </div>
            `).join('');
        } catch(e) { console.error(e); }
    }

    function cerrarSesion() { localStorage.clear(); window.location.href = 'index.html'; }
</script>
</body>
</html>
