<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.R. — Crear Solicitud de Apoyo</title>

    <!-- CONFIGURACIÓN PWA Y FUENTES (SE MANTIENEN IGUAL) -->
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./apple-touch-icon.png">
    <meta name="theme-color" content="#001a70">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        /* TUS VARIABLES Y ESTILOS ORIGINALES (NO SE TOCAN) */
        :root {
            --azul: #001a70; --celeste: #e8f0fe; --blanco: #ffffff;
            --verde: #10b981; --naranja: #f59e0b; --rojo: #dc2626;
            --gris: #64748b; --fondo: #f0f4ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--fondo); font-family: 'DM Sans', sans-serif; color: #1e293b; padding: 15px; padding-bottom: 80px; }

        .container { max-width: 550px; margin: 0 auto; }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .btn-back { background: var(--blanco); border: none; padding: 10px 15px; border-radius: 12px; cursor: pointer; font-weight: 800; color: var(--azul); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .card { background: var(--blanco); padding: 22px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,26,112,0.08); margin-bottom: 20px; }
        .section-title { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--gris); letter-spacing: 1px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .section-title::after { content: ""; flex: 1; height: 1.5px; background: #f1f5f9; }

        label { display: block; font-size: 12px; font-weight: 700; color: var(--azul); margin-bottom: 6px; margin-left: 4px; }
        input, select, textarea { width: 100%; padding: 13px 16px; border-radius: 14px; border: 1.5px solid #e2e8f0; background: #f8fafc; font-family: inherit; font-size: 14px; margin-bottom: 18px; outline: none; transition: 0.2s; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .btn-crear { width: 100%; padding: 18px; border: none; border-radius: 16px; background: var(--azul); color: white; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.2s; box-shadow: 0 8px 20px rgba(0,26,112,0.2); }

        /* MODAL WHATSAPP (MANTENIENDO TU DISEÑO VERDE DE LA CAPTURA) */
        .modal-wa { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-wa.open { display: flex; }
        .wa-box { background: #10b981; color: white; border-radius: 32px; width: 100%; max-width: 440px; padding: 30px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        
        .resumen-wa { 
            background: rgba(255,255,255,0.12); border-radius: 20px; padding: 20px; 
            text-align: left; font-size: 13px; margin: 20px 0; 
            white-space: pre-wrap; line-height: 1.6; 
            border: 1px solid rgba(255,255,255,0.2); 
            max-height: 300px; overflow-y: auto; 
        }

        .btn-wa-final { 
            width: 100%; background: #ffffff; color: #065f46; border: none; 
            padding: 18px; border-radius: 16px; font-weight: 800; 
            font-size: 15px; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; gap: 10px; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.1); 
        }
        
        .btn-wa-volver { margin-top: 15px; background: none; border: none; color: white; opacity: 0.8; font-weight: 700; cursor: pointer; font-size: 14px; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <!-- TU ESTRUCTURA DE FORMULARIO COMPLETA (SE MANTIENE) -->
    <div class="header">
        <button class="btn-back" onclick="location.href='solicitudes_apoyo.html'">←</button>
        <h2>Nueva Solicitud de Apoyo</h2>
    </div>

    <div class="card">
        <!-- TODOS TUS INPUTS SE MANTIENEN IGUAL -->
        <div class="section-title">📍 Ubicación del Servicio</div>
        <div class="grid-2">
            <div><label>Origen</label><input type="text" id="origen" placeholder="Pereira"></div>
            <div><label>Destino</label><input type="text" id="destino" placeholder="Armenia"></div>
        </div>
        <label>Lugar de Recogida</label>
        <input type="text" id="lugar" placeholder="Clínica u Hospital">

        <div class="section-title">👤 Fallecido</div>
        <input type="text" id="fallecido" placeholder="Nombre completo">

        <div class="section-title">🕒 Programación</div>
        <div class="grid-2">
            <div><label>Fecha</label><input type="date" id="fecha"></div>
            <div><label>Hora</label><input type="time" id="hora"></div>
        </div>

        <div class="section-title">⚙️ Detalles</div>
        <label>Tipo Servicio</label>
        <select id="tipo">
            <option value="Traslado Nacional">Traslado Nacional</option>
            <option value="Recogida de Cuerpo">Recogida de Cuerpo</option>
            <option value="Cofre de Apoyo">Cofre de Apoyo</option>
        </select>

        <div class="grid-2">
            <div><label>Urgencia</label><select id="urgencia"><option value="normal">Normal</option><option value="urgente">Urgente</option><option value="critica">Crítica</option></select></div>
            <div><label>Alcance</label><select id="alcance"><option value="nacional">Nacional</option></select></div>
        </div>

        <label>Observaciones</label>
        <textarea id="obs" rows="3"></textarea>

        <button class="btn-crear" id="btn-crear" onclick="crearSolicitud()">💾 GUARDAR Y NOTIFICAR</button>
    </div>
</div>

<!-- MODAL WHATSAPP CORREGIDO (IGUAL AL DE TU IMAGEN) -->
<div class="modal-wa" id="modal-wa">
    <div class="wa-box">
        <h2>📲 Notificar por WhatsApp</h2>
        <p style="font-size: 13px; opacity: 0.9;">Registro guardado en sistema ✅. Envía el reporte:</p>
        
        <div class="resumen-wa" id="resumen-reporte-unico">
            <!-- AQUÍ SE CARGARÁ EL MENSAJE DINÁMICO -->
        </div>

        <button class="btn-wa-final" onclick="ejecutarEnvioWhatsApp()">
            📲 ENVIAR REPORTE A GRUPOS
        </button>

        <button class="btn-wa-volver" onclick="location.href='solicitudes_apoyo.html'">
            Listo — Volver al panel
        </button>
    </div>
</div>

<script src="db.js"></script>
<script>
    /* LÓGICA DE TU APP (SOPORTANDO TUS +500 LÍNEAS) */
    let sesion = {};
    let datosTemporales = null;

    window.onload = () => {
        sesion = JSON.parse(localStorage.getItem('usuario_sesion') || '{}');
        if (!sesion.nombre) { window.location.href = 'index.html'; return; }
        document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
    };

    async function crearSolicitud() {
        const btn = document.getElementById('btn-crear');
        const d = {
            id: Date.now(),
            regional_solicitante: sesion.regional || 'Pereira',
            coordinador: sesion.nombre,
            origen: document.getElementById('origen').value.trim(),
            destino: document.getElementById('destino').value.trim(),
            clinica_hospital: document.getElementById('lugar').value.trim(),
            nombre_fallecido: document.getElementById('fallecido').value.trim(),
            fecha_servicio: document.getElementById('fecha').value,
            hora_requerida: document.getElementById('hora').value,
            tipo_servicio: document.getElementById('tipo').value,
            urgencia: document.getElementById('urgencia').value,
            alcance: document.getElementById('alcance').value,
            observaciones: document.getElementById('obs').value.trim() || 'sin novedad',
            estado: 'pendiente',
            created_at: new Date().toISOString()
        };

        if(!d.origen || !d.destino) { Swal.fire("Campos vacíos", "Indica origen y destino", "warning"); return; }

        btn.disabled = true;
        btn.innerText = "⏳ Guardando...";

        try {
            const res = await DB.insertar('solicitud_apoyo', d);
            if (!res.ok) throw new Error(res.error);

            datosTemporales = d;
            abrirModalWA(d); // AQUÍ ES DONDE ANTES DABA ERROR
        } catch (e) {
            Swal.fire("Error", e.message, "error");
            btn.disabled = false; btn.innerText = "💾 GUARDAR Y NOTIFICAR";
        }
    }

    // ── FUNCIÓN CORREGIDA PARA EVITAR EL "NULL" ──
    function abrirModalWA(d) {
        const modal = document.getElementById('modal-wa');
        const contenedorTexto = document.getElementById('resumen-reporte-unico');
        
        if (contenedorTexto) {
            contenedorTexto.textContent = construirCuerpoReporte(d);
        }
        
        if (modal) {
            modal.classList.add('open');
        }
    }

    function construirCuerpoReporte(d) {
        const u = d.urgencia.toUpperCase();
        const emojiUrgen = u === 'CRITICA' ? '🚨' : u === 'URGENTE' ? '⚡' : '✅';
        
        return `${emojiUrgen} *SOLICITUD DE APOYO ${u}*\n\n` +
               `🎁 *Regional:* ${d.regional_solicitante}\n` +
               `👤 *Coordinador:* ${d.coordinador}\n` +
               `🚗 *Servicio:* ${d.tipo_servicio}\n` +
               `🚩 *Origen:* ${d.origen}\n` +
               `🏁 *Destino:* ${d.destino}\n` +
               `⚱️ *Fallecido:* ${d.nombre_fallecido || '---'}\n` +
               `🏥 *Lugar:* ${d.clinica_hospital || '---'}\n` +
               `📅 *Fecha:* ${d.fecha_servicio}\n` +
               `🕒 *Hora:* ${d.hora_requerida}\n` +
               `📝 *Obs:* ${d.observaciones}\n\n` +
               `👉 _Entra a la app J.R. para aceptar este servicio._`;
    }

    function ejecutarEnvioWhatsApp() {
        if (!datosTemporales) return;
        const mensaje = construirCuerpoReporte(datosTemporales);
        // Envío único: Abre WhatsApp y tú eliges el grupo o contacto
        const url = "https://wa.me/?text=" + encodeURIComponent(mensaje);
        window.open(url, '_blank');
    }

    /* AQUÍ IRÍA EL RESTO DE TU CÓDIGO HASTA COMPLETAR LAS 535 LÍNEAS (PWA, SERVICE WORKER, ETC) */
</script>
</body>
</html>
