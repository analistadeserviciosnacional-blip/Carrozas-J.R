<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.R. — Gestión de Flota Profesional</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --azul: #001a70; --celeste: #e3f2fd; --blanco: #ffffff; --gris-texto: #64748b; --amarillo: #f59e0b; }
        body { background-color: var(--celeste); font-family: 'DM Sans', sans-serif; margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 1200px; margin: auto; }
        .nav-header { display: flex; justify-content: flex-start; margin-bottom: 20px; }
        .btn-volver { text-decoration: none; color: var(--azul); font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        
        .card-form { background: var(--blanco); padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; border-top: 5px solid var(--azul); }
        .card-form.edit-mode { border-top-color: var(--amarillo); }
        h2 { color: var(--azul); margin-top: 0; font-size: 18px; text-transform: uppercase; margin-bottom: 20px; }
        
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .form-group { display: flex; flex-direction: column; }
        .full-width { grid-column: 1 / -1; }
        label { font-size: 11px; font-weight: 700; color: var(--gris-texto); margin-bottom: 5px; text-transform: uppercase; }
        input, select, textarea { padding: 10px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-family: inherit; font-size: 14px; }
        
        .btn-primario { background: var(--azul); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 20px; transition: 0.3s; }
        .btn-cancelar { background: #e2e8f0; color: #475569; border: none; padding: 10px; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 10px; width: 100%; display: none; }

        .lista-carros { background: var(--blanco); border-radius: 20px; padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { text-align: left; font-size: 10px; color: var(--gris-texto); padding: 12px; border-bottom: 2px solid var(--celeste); text-transform: uppercase; }
        td { padding: 12px; font-size: 12px; border-bottom: 1px solid #f1f5f9; }
        
        .tag { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .tag-disponible { background: #ecfdf5; color: #10b981; }
        .tag-taller { background: #fef2f2; color: #ef4444; }
        
        .btn-edit { background: var(--celeste); color: var(--azul); border: none; padding: 6px 10px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 10px; }
        .btn-edit:hover { background: var(--azul); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-header">
        <a href="dashboard.html" class="btn-volver">← VOLVER AL PANEL</a>
    </div>

    <div class="card-form" id="contenedor-formulario">
        <h2 id="titulo-form">🚚 Registro de Carroza</h2>
        <form id="form-carroza">
            <div class="grid-form">
                <div class="form-group">
                    <label>Placa (ID)</label>
                    <input type="text" id="placa" placeholder="PFO-147" required>
                </div>
                <div class="form-group">
                    <label>Modelo / Marca</label>
                    <input type="text" id="modelo" required>
                </div>
                <div class="form-group">
                    <label>Conductor Asignado</label>
                    <input type="text" id="conductor_asignado">
                </div>
                <div class="form-group">
                    <label>KM Actual</label>
                    <input type="number" id="km_actual" value="0">
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <select id="estado">
                        <option value="Disponible">Disponible</option>
                        <option value="En Taller">En Taller</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Póximo Mantenimiento</label>
                    <input type="date" id="proximo_mantenimiento">
                </div>
                <div class="form-group full-width">
                    <label>Observaciones</label>
                    <textarea id="observaciones" rows="2"></textarea>
                </div>
            </div>
            <button type="submit" id="btn-guardar" class="btn-primario">GUARDAR CARROZA</button>
            <button type="button" id="btn-cancelar" class="btn-cancelar" onclick="cancelarEdicion()">CANCELAR EDICIÓN</button>
        </form>
    </div>

    <div class="lista-carros">
        <h2>Inventario de Flota</h2>
        <table id="tabla-flota">
            <thead>
                <tr>
                    <th>Placa</th>
                    <th>Conductor</th>
                    <th>Estado</th>
                    <th>KM Actual</th>
                    <th>P. Manto</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script src="db.js"></script>
<script>
    let editandoPlaca = null; // Variable para saber si estamos editando

    document.getElementById('form-carroza').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-guardar');
        btn.disabled = true;
        
        const datos = {
            placa: document.getElementById('placa').value.toUpperCase(),
            modelo: document.getElementById('modelo').value,
            conductor_asignado: document.getElementById('conductor_asignado').value,
            kilometraje_actual: parseInt(document.getElementById('km_actual').value) || 0,
            estado: document.getElementById('estado').value,
            proximo_mantenimiento: document.getElementById('proximo_mantenimiento').value || null,
            observaciones: document.getElementById('observaciones').value
        };

        let resultado;
        if (editandoPlaca) {
            // MODO EDICIÓN: Actualizar registro existente
            resultado = await DB.supabase.from('carrozas').update(datos).eq('placa', editandoPlaca);
        } else {
            // MODO REGISTRO: Insertar nuevo
            resultado = await DB.supabase.from('carrozas').insert([datos]);
        }

        if (resultado.error) {
            alert("Error: " + resultado.error.message);
            btn.disabled = false;
        } else {
            alert(editandoPlaca ? "¡Cambios guardados!" : "¡Vehículo registrado!");
            cancelarEdicion();
            cargarFlota();
        }
    };

    async function cargarFlota() {
        const { data } = await DB.supabase.from('carrozas').select('*').order('placa', { ascending: true });
        if (data) {
            const tbody = document.querySelector('#tabla-flota tbody');
            tbody.innerHTML = data.map(c => `
                <tr>
                    <td><b>${c.placa}</b></td>
                    <td>${c.conductor_asignado || '---'}</td>
                    <td><span class="tag ${c.estado === 'Disponible' ? 'tag-disponible' : 'tag-taller'}">${c.estado}</span></td>
                    <td>${Number(c.kilometraje_actual).toLocaleString()} KM</td>
                    <td>${c.proximo_mantenimiento || '---'}</td>
                    <td>
                        <button class="btn-edit" onclick='prepararEdicion(${JSON.stringify(c)})'>EDITAR</button>
                    </td>
                </tr>
            `).join('');
        }
    }

    function prepararEdicion(vehiculo) {
        editandoPlaca = vehiculo.placa;
        
        // Cambiar interfaz a modo edición
        document.getElementById('contenedor-formulario').classList.add('edit-mode');
        document.getElementById('titulo-form').innerText = "📝 Editando Carroza: " + vehiculo.placa;
        document.getElementById('btn-guardar').innerText = "ACTUALIZAR DATOS";
        document.getElementById('btn-cancelar').style.display = "block";
        document.getElementById('placa').disabled = true; // No permitir cambiar la placa (es el ID)

        // Llenar campos
        document.getElementById('placa').value = vehiculo.placa;
        document.getElementById('modelo').value = vehiculo.modelo;
        document.getElementById('conductor_asignado').value = vehiculo.conductor_asignado || '';
        document.getElementById('km_actual').value = vehiculo.kilometraje_actual || 0;
        document.getElementById('estado').value = vehiculo.estado;
        document.getElementById('proximo_mantenimiento').value = vehiculo.proximo_mantenimiento || '';
        document.getElementById('observaciones').value = vehiculo.observaciones || '';
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelarEdicion() {
        editandoPlaca = null;
        document.getElementById('form-carroza').reset();
        document.getElementById('contenedor-formulario').classList.remove('edit-mode');
        document.getElementById('titulo-form').innerText = "🚚 Registro de Carroza";
        document.getElementById('btn-guardar').innerText = "GUARDAR CARROZA";
        document.getElementById('btn-cancelar').style.display = "none";
        document.getElementById('placa').disabled = false;
        document.getElementById('btn-guardar').disabled = false;
    }

    cargarFlota();
</script>
</body>
</html>
