<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.R. — Gestión de Flota</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --azul: #001a70; --celeste: #e3f2fd; --blanco: #ffffff; --gris-texto: #64748b; }
        body { background-color: var(--celeste); font-family: 'DM Sans', sans-serif; margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 800px; margin: auto; }
        
        /* Estilo para el botón de volver */
        .nav-header { display: flex; justify-content: flex-start; margin-bottom: 20px; }
        .btn-volver { 
            text-decoration: none; 
            color: var(--azul); 
            font-weight: 700; 
            font-size: 14px; 
            display: flex; 
            align-items: center; 
            gap: 5px;
            transition: 0.3s;
        }
        .btn-volver:hover { opacity: 0.7; }

        .card-form { background: var(--blanco); padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        h2 { color: var(--azul); margin-top: 0; font-size: 20px; text-transform: uppercase; }
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        label { font-size: 12px; font-weight: 700; color: var(--gris-texto); margin-bottom: 5px; }
        input, select { padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-family: inherit; }
        .btn-primario { background: var(--azul); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-primario:disabled { background: #94a3b8; cursor: not-allowed; }

        .lista-carros { background: var(--blanco); border-radius: 20px; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; font-size: 12px; color: var(--gris-texto); padding: 10px; border-bottom: 2px solid var(--celeste); }
        td { padding: 12px; font-size: 14px; border-bottom: 1px solid #f1f5f9; }
        .tag { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .tag-disponible { background: #ecfdf5; color: #10b981; }
        .tag-taller { background: #fef2f2; color: #ef4444; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-header">
        <a href="dashboard.html" class="btn-volver">← VOLVER AL PANEL</a>
    </div>

    <div class="card-form">
        <h2>🚚 Registrar Nueva Carroza</h2>
        <form id="form-carroza">
            <div class="grid-form">
                <div class="form-group">
                    <label>Placa (ID)</label>
                    <input type="text" id="placa" placeholder="ABC-123" required>
                </div>
                <div class="form-group">
                    <label>Modelo / Marca</label>
                    <input type="text" id="modelo" placeholder="Ej: Foton" required>
                </div>
                <div class="form-group">
                    <label>Año</label>
                    <input type="number" id="anio" placeholder="2024">
                </div>
                <div class="form-group">
                    <label>Fecha Ingreso a Empresa</label>
                    <input type="date" id="fecha_ingreso" required>
                </div>
                <div class="form-group">
                    <label>KM Inicial</label>
                    <input type="number" id="km_inicial" value="0">
                </div>
                <div class="form-group">
                    <label>Estado Inicial</label>
                    <select id="estado">
                        <option value="Disponible">Disponible</option>
                        <option value="En Taller">En Taller</option>
                    </select>
                </div>
            </div>
            <button type="submit" id="btn-guardar" class="btn-primario">GUARDAR VEHÍCULO</button>
        </form>
    </div>

    <div class="lista-carros">
        <h2>Inventario de Flota</h2>
        <table id="tabla-flota">
            <thead>
                <tr>
                    <th>Placa</th>
                    <th>Modelo</th>
                    <th>Ingreso</th>
                    <th>KM Actual</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>

<script src="db.js"></script>
<script>
    document.getElementById('fecha_ingreso').valueAsDate = new Date();

    document.getElementById('form-carroza').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-guardar');
        btn.innerText = "Guardando...";
        btn.disabled = true;
        
        const nuevaCarroza = {
            placa: document.getElementById('placa').value.toUpperCase(),
            modelo: document.getElementById('modelo').value,
            anio: parseInt(document.getElementById('anio').value) || 0,
            fecha_ingreso_empresa: document.getElementById('fecha_ingreso').value,
            kilometraje_inicial: parseInt(document.getElementById('km_inicial').value) || 0,
            kilometraje_actual: parseInt(document.getElementById('km_inicial').value) || 0,
            estado: document.getElementById('estado').value
        };

        // Corregido a 'carrozas' (minúsculas) según tu base de datos
        const { error } = await DB.supabase.from('carrozas').insert([nuevaCarroza]);

        if (error) {
            alert("Error al guardar: " + error.message);
            btn.innerText = "GUARDAR VEHÍCULO";
            btn.disabled = false;
        } else {
            alert("Carroza registrada con éxito");
            location.reload();
        }
    };

    async function cargarFlota() {
        const { data, error } = await DB.supabase.from('carrozas').select('*').order('placa', { ascending: true });
        
        if (data) {
            const tbody = document.querySelector('#tabla-flota tbody');
            tbody.innerHTML = data.map(c => `
                <tr>
                    <td><b>${c.placa}</b></td>
                    <td>${c.modelo}</td>
                    <td>${c.fecha_ingreso_empresa || 'N/A'}</td>
                    <td>${c.kilometraje_actual || 0} KM</td>
                    <td>
                        <span class="tag ${c.estado === 'Disponible' ? 'tag-disponible' : 'tag-taller'}">
                            ${c.estado}
                        </span>
                    </td>
                </tr>
            `).join('');
        }
    }
    cargarFlota();
</script>
</body>
</html>
