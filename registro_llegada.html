<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>J.R. — Registro de Llegada</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --azul: #001a70; --celeste: #e3f2fd; --blanco: #ffffff; }
        body { background-color: var(--celeste); font-family: 'DM Sans', sans-serif; margin: 0; padding: 15px; }
        
        .container { background: var(--blanco); border-radius: 25px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 500px; margin: auto; }
        
        h2 { color: var(--azul); text-align: center; font-size: 20px; margin-bottom: 25px; text-transform: uppercase; }
        
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 700; color: #64748b; margin-bottom: 8px; margin-left: 5px; }
        
        input, select, textarea { 
            width: 100%; padding: 14px; border: 1.5px solid #e2e8f0; border-radius: 15px; 
            font-size: 15px; box-sizing: border-box; font-family: inherit; transition: 0.3s;
        }
        
        input:focus { border-color: var(--azul); outline: none; background: #f8faff; }

        .btn-finalizar { 
            background: #10b981; color: white; border: none; width: 100%; 
            padding: 16px; border-radius: 15px; font-weight: 700; font-size: 16px; 
            cursor: pointer; margin-top: 10px; transition: 0.3s;
        }
        
        .btn-finalizar:active { transform: scale(0.98); opacity: 0.9; }

        .btn-regresar {
            display: block; text-align: center; margin-top: 20px; color: #64748b;
            text-decoration: none; font-size: 14px; font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🏁 Registro de Llegada</h2>
    
    <form id="form-llegada">
        <div class="form-group">
            <label>Placa de la Carroza</label>
            <select id="placa" required>
                <option value="">Seleccione placa...</option>
            </select>
        </div>

        <div class="form-group">
            <label>Kilometraje al Ingresar</label>
            <input type="number" id="km_ingreso" placeholder="Ej: 155280" required>
        </div>

        <div class="form-group">
            <label>Hora de Entrada</label>
            <input type="time" id="hora_ingreso" required>
        </div>

        <div class="form-group">
            <label>Estado de Entrega</label>
            <select id="estado_entrega">
                <option value="Todo En Orden 👍🏻">Todo En Orden 👍🏻</option>
                <option value="Requiere Lavado 🧼">Requiere Lavado 🧼</option>
                <option value="Novedad Mecánica 🔧">Novedad Mecánica 🔧</option>
                <option value="Pendiente Tanqueo ⛽">Pendiente Tanqueo ⛽</option>
            </select>
        </div>

        <div class="form-group">
            <label>Observaciones Finales</label>
            <textarea id="observaciones" rows="3" placeholder="¿Alguna novedad en el servicio?"></textarea>
        </div>

        <button type="submit" class="btn-finalizar" id="btn-submit">FINALIZAR SERVICIO</button>
    </form>

    <a href="dashboard.html" class="btn-regresar">← Volver al Panel</a>
</div>

<script src="db.js"></script>
<script>
    // 1. Cargar placas disponibles (que estén "En Servicio")
    window.onload = async () => {
        const ahora = new Date();
        document.getElementById('hora_ingreso').value = ahora.getHours().toString().padStart(2, '0') + ":" + ahora.getMinutes().toString().padStart(2, '0');

        const { data, error } = await DB.supabase
            .from('Carrozas')
            .select('placa')
            .eq('estado', 'En Servicio'); // Solo las que están afuera
        
        const select = document.getElementById('placa');
        if (data && data.length > 0) {
            select.innerHTML = '<option value="">Elija placa...</option>' + 
                data.map(c => `<option value="${c.placa}">${c.placa}</option>`).join('');
        } else {
            select.innerHTML = '<option value="">No hay carros en servicio</option>';
        }
    };

    document.getElementById('form-llegada').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-submit');
        btn.innerText = "Procesando...";
        btn.disabled = true;

        const datos = {
            placa: document.getElementById('placa').value,
            km_ingreso: parseInt(document.getElementById('km_ingreso').value),
            hora_ingreso: document.getElementById('hora_ingreso').value,
            observaciones: document.getElementById('observaciones').value,
            estado_entrega: document.getElementById('estado_entrega').value
        };

        // ACTUALIZAR TABLA CARROZAS (Km y Estado)
        const { error: errorCarroza } = await DB.supabase
            .from('Carrozas')
            .update({ 
                kilometraje_actual: datos.km_ingreso,
                estado: 'Disponible' 
            })
            .eq('placa', datos.placa);

        if (errorCarroza) {
            alert("Error: " + errorCarroza.message);
        } else {
            enviarConfirmacionWA(datos);
            alert("Llegada registrada con éxito. Carroza " + datos.placa + " ahora está DISPONIBLE.");
            window.location.href = "dashboard.html";
        }
        
        btn.disabled = false;
        btn.innerText = "FINALIZAR SERVICIO";
    };

    function enviarConfirmacionWA(d) {
        const hora = new Date().getHours();
        let saludo = (hora < 12) ? "Buenos días ☀️" : (hora < 18) ? "Buenas tardes 🌤️" : "Buenas noches 🌜";
        
        const mensaje = `${saludo}\n\n` +
                        `🏁 *REPORTE DE LLEGADA J.R.*\n\n` +
                        `🚗 *Placa:* ${d.placa}\n` +
                        `🕒 *Hora Ingreso:* ${d.hora_ingreso}\n` +
                        `📊 *KM Final:* ${d.km_ingreso}\n` +
                        `✨ *Estado:* ${d.estado_entrega}\n` +
                        `📝 *Obs:* ${d.observaciones || 'Sin novedad'}\n\n` +
                        `✅ _Vehículo listo para nuevo servicio._`;
        
        window.open(`https://wa.me/?text=${encodeURIComponent(mensaje)}`, '_blank');
    }
</script>

</body>
</html>
