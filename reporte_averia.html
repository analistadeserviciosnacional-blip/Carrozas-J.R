<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.R. — Reporte Oficial de Avería</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --azul: #004a99; --celeste: #e3f2fd; --blanco: #ffffff; --rojo: #dc2626; --gris: #f8fbff; --verde: #25d366; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--celeste); font-family: 'DM Sans', sans-serif; padding: 10px; }
        .container { max-width: 650px; margin: 0 auto; background: var(--blanco); border-radius: 20px; box-shadow: 0 10px 25px rgba(0,74,153,0.1); overflow: hidden; }
        .header { background: var(--rojo); color: white; padding: 20px; text-align: center; position: relative; }
        .btn-volver { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.2); color: white; border: none; padding: 8px 14px; border-radius: 10px; font-weight: bold; font-size: 12px; cursor: pointer; }
        .content { padding: 20px; }
        .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: #546e7a; margin: 20px 0 10px; border-bottom: 2px solid var(--celeste); padding-bottom: 5px; font-weight: 700; }
        label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 5px; color: var(--azul); text-transform: uppercase; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border: 2px solid var(--celeste); border-radius: 10px; font-family: inherit; color: var(--azul); background: var(--gris); font-size: 14px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .upload-container { border: 2px dashed var(--rojo); border-radius: 15px; padding: 15px; text-align: center; background: #fff5f5; cursor: pointer; margin-bottom: 12px; }
        .preview-gallery { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
        .thumb-wrap { position: relative; width: 100%; aspect-ratio: 1/1; }
        .thumb-wrap img { width: 100%; height: 100%; border-radius: 8px; object-fit: cover; border: 1px solid #fecaca; }
        .btn-del { position: absolute; top: -5px; right: -5px; background: #ff4444; color: white; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-weight: bold; }
        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-db { background: var(--rojo); color: white; }
        .btn-wa { background: var(--verde); color: white; opacity: 0.6; }
        .btn-wa.active { opacity: 1; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <button class="btn-volver" onclick="irAtras()">← VOLVER</button>
        <h2>🚨 REPORTE DE AVERÍA</h2>
    </div>

    <div class="content">
        <div class="section-title">1. Identificación</div>
        <div class="grid-2">
            <div>
                <label>Reportado por</label>
                <input type="text" id="reportado_por" readonly style="background:#f1f5f9;">
            </div>
            <div>
                <label>Regional</label>
                <select id="regional">
                    <option>Pereira</option><option>Armenia</option><option>Manizales</option><option>Cali</option>
                </select>
            </div>
        </div>

        <div class="grid-2">
            <div>
                <label>Placa Vehículo</label>
                <select id="placa_vehiculo" onchange="autoCompletarVehiculo()">
                    <option value="">Cargando...</option>
                </select>
            </div>
            <div>
                <label>Tipo Vehículo</label>
                <input type="text" id="tipo_vehiculo" readonly style="background:#f1f5f9;">
            </div>
        </div>

        <div class="section-title">2. Detalles Técnicos</div>
        <label>Tipo de Falla</label>
        <select id="tipo_falla">
            <option value="">Seleccione falla...</option>
            <option>Falla mecánica</option>
            <option>Falla eléctrica</option>
            <option>Accidente / Golpe</option>
            <option>Llantas</option>
            <option>Otro</option>
        </select>

        <label>Descripción de Síntomas (Campo CSV)</label>
        <textarea id="descripcion_sintomas" rows="3" placeholder="Ej: El carro tironea en subida..."></textarea>

        <label>Observaciones Adicionales</label>
        <textarea id="observaciones" rows="2"></textarea>

        <div class="section-title">3. Evidencias</div>
        <div class="upload-container" onclick="document.getElementById('fotos-input').click()">
            <span id="upload-text">📸 Toque para adjuntar (Máx 4)</span>
            <input type="file" id="fotos-input" accept="image/*" multiple hidden onchange="procesarFotos(this)">
        </div>
        <div id="galeria" class="preview-gallery"></div>

        <div class="section-title">4. Notificación Final</div>
        <label>Notificar a:</label>
        <select id="whatsapp_destino">
            <option value="573100000000">Coordinador Pereira</option>
            <option value="573200000000">Taller Central</option>
        </select>

        <button class="btn-action btn-db" id="btn-envio" onclick="guardarTodo()">🚨 GUARDAR EN SISTEMA</button>
        <button class="btn-action btn-wa" id="btn-wa" onclick="enviarWA()" disabled>✅ ENVIAR WHATSAPP</button>
    </div>
</div>

<script src="db.js"></script>
<script>
    let fotosArray = [];
    let listadoCarrozas = [];

    window.onload = async () => {
        const user = JSON.parse(localStorage.getItem('usuario_sesion') || '{}');
        document.getElementById('reportado_por').value = user.nombre || "Sin Nombre";
        await cargarCarrozas();
    };

    async function cargarCarrozas() {
        const { data } = await DB.supabase.from('carrozas').select('placa, modelo').order('placa');
        if (data) {
            listadoCarrozas = data;
            const select = document.getElementById('placa_vehiculo');
            select.innerHTML = '<option value="">Seleccione...</option>' + 
                data.map(v => `<option value="${v.placa}">${v.placa}</option>`).join('');
        }
    }

    function autoCompletarVehiculo() {
        const placa = document.getElementById('placa_vehiculo').value;
        const v = listadoCarrozas.find(x => x.placa === placa);
        document.getElementById('tipo_vehiculo').value = v ? `Carroza ${v.placa}` : "";
    }

    function procesarFotos(input) {
        Array.from(input.files).forEach(f => {
            if (fotosArray.length < 4) {
                const r = new FileReader();
                r.readAsDataURL(f);
                r.onload = (e) => { fotosArray.push(e.target.result); renderGaleria(); };
            }
        });
    }

    function renderGaleria() {
        document.getElementById('galeria').innerHTML = fotosArray.map((img, i) => `
            <div class="thumb-wrap"><img src="${img}"><button class="btn-del" onclick="eliminarFoto(${i})">×</button></div>`).join('');
    }

    function eliminarFoto(i) { fotosArray.splice(i, 1); renderGaleria(); }

    async function guardarTodo() {
        const btn = document.getElementById('btn-envio');
        const placa = document.getElementById('placa_vehiculo').value;
        if (!placa || !document.getElementById('tipo_falla').value) return alert("Faltan datos obligatorios.");

        btn.disabled = true; btn.innerText = "⏳ REGISTRANDO...";

        const registro = {
            reportado_por: document.getElementById('reportado_por').value,
            regional: document.getElementById('regional').value,
            placa_vehiculo: placa,
            tipo_vehiculo: document.getElementById('tipo_vehiculo').value,
            tipo_falla: document.getElementById('tipo_falla').value,
            descripcion_sintomas: document.getElementById('descripcion_sintomas').value,
            observaciones: document.getElementById('observaciones').value,
            imagen1: fotosArray[0] || null,
            imagen2: fotosArray[1] || null,
            imagen3: fotosArray[2] || null,
            imagen4: fotosArray[3] || null
        };

        const { error } = await DB.supabase.from('averias').insert([registro]);

        if (!error) {
            btn.innerText = "✓ GUARDADO"; btn.style.background = "#16a34a";
            // Activar botón WhatsApp
            const btnWA = document.getElementById('btn-wa');
            btnWA.disabled = false; btnWA.classList.add('active');
            // Actualizar estado de carroza
            await DB.supabase.from('carrozas').update({ estado: 'En Taller' }).eq('placa', placa);
        } else {
            alert("Error: " + error.message);
            btn.disabled = false; btn.innerText = "🚨 REINTENTAR";
        }
    }

    function enviarWA() {
        const placa = document.getElementById('placa_vehiculo').value;
        const tel = document.getElementById('whatsapp_destino').value;
        const msj = `*🚨 NUEVO REPORTE - J.R.*%0A*Vehículo:* ${placa}%0A*Falla:* ${document.getElementById('tipo_falla').value}%0A*Reporta:* ${document.getElementById('reportado_por').value}`;
        window.open(`https://wa.me/${tel}?text=${msj}`, '_blank');
    }

    function irAtras() {
        const sesion = JSON.parse(localStorage.getItem('usuario_sesion') || '{}');
        window.location.href = (sesion.rol === 'admin') ? "dashboard.html" : "panel_conductor.html";
    }
</script>
</body>
</html>
