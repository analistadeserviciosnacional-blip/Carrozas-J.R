<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Averías</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --azul: #004a99; --celeste: #e3f2fd; --blanco: #ffffff; --rojo: #dc2626; --gris: #f8fbff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--celeste); font-family: 'DM Sans', sans-serif; padding: 10px; }
        .container { max-width: 650px; margin: 0 auto; background: var(--blanco); border-radius: 20px; box-shadow: 0 10px 25px rgba(0,74,153,0.1); overflow: hidden; }
        .header { background: var(--rojo); color: white; padding: 20px; text-align: center; position: relative; }
        .btn-volver { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.2); color: white; border: none; padding: 8px 14px; border-radius: 10px; font-weight: bold; font-size: 12px; cursor: pointer; }
        .content { padding: 20px; }
        .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: #546e7a; margin: 20px 0 10px; border-bottom: 2px solid var(--celeste); padding-bottom: 5px; font-weight: 700; }
        label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 5px; color: var(--azul); text-transform: uppercase; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 12px; border: 2px solid var(--celeste); border-radius: 10px; font-family: inherit; color: var(--azul); background: var(--gris); font-size: 14px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .upload-container { border: 2px dashed var(--rojo); border-radius: 15px; padding: 15px; text-align: center; background: #fff5f5; cursor: pointer; margin-bottom: 12px; }
        .preview-gallery { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
        .thumb-wrap { position: relative; width: 100%; aspect-ratio: 1/1; }
        .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 1px solid #fecaca; }
        .btn-del { position: absolute; top: -5px; right: -5px; background: #ff4444; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; cursor: pointer; font-weight: bold; }
        .btn-save { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 10px; background: var(--rojo); color: white; }
        .btn-save:disabled { background: #94a3b8; cursor: not-allowed; }
        .badge-usuario { background: #eef5ff; border: 2px solid var(--azul); font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <button class="btn-volver" onclick="irAtras()">← VOLVER</button>
        <h2>⚠️ REPORTE DE AVERÍA</h2>
        <p id="rol-info" style="font-size:11px; opacity:0.8; font-weight:bold; margin-top:4px;"></p>
    </div>

    <div class="content">
        <div class="section-title">Datos del Responsable</div>
        <div class="grid-2">
            <div>
                <label>Reportado por</label>
                <input type="text" id="reportado_por" readonly class="badge-usuario">
            </div>
            <div>
                <label>Regional</label>
                <select id="regional">
                    <option>Pereira</option>
                    <option>Armenia</option>
                    <option>Manizales</option>
                    <option>Cali</option>
                </select>
            </div>
        </div>

        <div class="section-title">Datos del Vehículo</div>
        <div class="grid-2">
            <div>
                <label>Placa del Vehículo</label>
                <!-- id="placa" → se enviará como datos.placa → guardado en placa_vehiculo ✅ -->
                <input type="text" id="placa" placeholder="ABC-123">
            </div>
            <div>
                <label>Vehículo / Carroza</label>
                <!-- id="vehiculo" → se enviará como datos.vehiculo → guardado en tipo_vehiculo ✅ -->
                <select id="vehiculo">
                    <option value="">Seleccionar...</option>
                    <option>Carroza GJX-497</option>
                    <option>Carroza ICQ-333</option>
                    <option>Furgón de Apoyo</option>
                    <option>Otro</option>
                </select>
            </div>
        </div>

        <div class="section-title">Síntomas y Descripción</div>
        <label>Tipo de Falla</label>
        <select id="tipo_falla">
            <option value="">Seleccionar tipo...</option>
            <option>Falla mecánica</option>
            <option>Falla eléctrica</option>
            <option>Accidente / Golpe</option>
            <option>Llanta pinchada</option>
            <option>Frenos</option>
            <option>Motor / Recalentamiento</option>
            <option>Otro</option>
        </select>

        <label>Descripción de Síntomas</label>
        <!-- id="sintomas" → se enviará como datos.sintomas → guardado en descripcion_sintomas ✅ -->
        <textarea id="sintomas" rows="3" placeholder="Describe detalladamente qué sucede, qué ruidos, qué falla..."></textarea>

        <label>Observaciones Adicionales</label>
        <textarea id="observaciones" rows="2" placeholder="Información adicional relevante..."></textarea>

        <div class="section-title">Evidencias Fotográficas (Máximo 4)</div>
        <div class="upload-container" onclick="document.getElementById('fotos-input').click()">
            <span id="upload-text">📸 Toca para subir fotos del daño</span>
            <input type="file" id="fotos-input" accept="image/*" multiple hidden onchange="procesarFotos(this)">
        </div>
        <div class="preview-gallery" id="galeria"></div>

        <button class="btn-save" id="btn-envio" onclick="guardarAveria()">🚨 ENVIAR REPORTE DE AVERÍA</button>
    </div>
</div>

<script src="db.js"></script>
<script>
    let fotosArray = [];

    window.onload = () => {
        const sesionRaw = localStorage.getItem('usuario_sesion') || localStorage.getItem('usuario_data');
        if (!sesionRaw) { window.location.href = "index.html"; return; }
        const user = JSON.parse(sesionRaw);
        const nombre = user.nombre || user.nombre_completo || user.username || "Usuario";
        document.getElementById('reportado_por').value = nombre;
        document.getElementById('rol-info').innerText = "SESIÓN: " + (user.rol || "CONDUCTOR").toUpperCase();
    };

    function irAtras() {
        const sesion = JSON.parse(localStorage.getItem('usuario_sesion') || localStorage.getItem('usuario_data') || '{}');
        const rol = (sesion.rol || '').toLowerCase().trim();
        window.location.href = rol === 'admin' ? "dashboard.html" : "panel_conductor.html";
    }

    async function procesarFotos(input) {
        for (let f of Array.from(input.files)) {
            if (fotosArray.length < 4) {
                const reader = new FileReader();
                reader.readAsDataURL(f);
                reader.onload = (e) => { fotosArray.push(e.target.result); renderGaleria(); };
            }
        }
    }

    function renderGaleria() {
        document.getElementById('galeria').innerHTML = fotosArray.map((img, i) => `
            <div class="thumb-wrap">
                <img src="${img}">
                <button class="btn-del" onclick="eliminarFoto(${i})">×</button>
            </div>`).join('');
        document.getElementById('upload-text').innerText = `📸 ${fotosArray.length} de 4 fotos cargadas`;
    }

    function eliminarFoto(i) { fotosArray.splice(i, 1); renderGaleria(); }

    async function guardarAveria() {
        const btn = document.getElementById('btn-envio');
        const placa    = document.getElementById('placa').value.trim();
        const vehiculo = document.getElementById('vehiculo').value;
        const sintomas = document.getElementById('sintomas').value.trim();

        if (!placa || !vehiculo || !sintomas) {
            alert("Por favor completa: Placa, Vehículo y Síntomas"); return;
        }

        btn.disabled = true; btn.innerText = "⏳ ENVIANDO...";

        // Los nombres aquí (placa, vehiculo, sintomas) son los que recibe
        // guardarAveria() en db.js y los mapea a los nombres reales de Supabase
        const datos = {
            reportado_por: document.getElementById('reportado_por').value,
            regional:      document.getElementById('regional').value,
            placa:         placa.toUpperCase(),   // → placa_vehiculo en Supabase
            vehiculo:      vehiculo,               // → tipo_vehiculo en Supabase
            tipo_falla:    document.getElementById('tipo_falla').value,
            sintomas:      sintomas,               // → descripcion_sintomas en Supabase
            observaciones: document.getElementById('observaciones').value,
            imagen1:       iamgenArray[0] || "",
            imagen2:       imagenArray[1] || "",
            imagen3:       imagenArray[2] || "",
            imagen4:       imagenArray[3] || ""
        };

        try {
            const res = await DB.guardarAveria(datos);
            if (res.ok) {
                btn.innerText = "✓ REPORTE ENVIADO";
                btn.style.background = "#16a34a";
                setTimeout(() => irAtras(), 1500);
            } else {
                throw new Error(res.error?.message || "Error desconocido");
            }
        } catch(e) {
            alert("Error al guardar: " + e.message);
            btn.disabled = false; btn.innerText = "🚨 ENVIAR REPORTE DE AVERÍA";
        }
    }
    function enviarWhatsAppAveria() {
        const reportado = document.getElementById('reportado_por').value;
        const placa = document.getElementById('placa').value.toUpperCase();
        const falla = document.getElementById('tipo_falla').value;
        const regional = document.getElementById('regional').value;

        if(!placa || !falla) { alert("Completa los datos primero"); return; }

        const msj = `*🚨 REPORTE DE AVERÍA - J.R.*%0A` +
                    `----------------------------%0A` +
                    `👤 *Por:* ${reportado}%0A` +
                    `📍 *Regional:* ${regional}%0A` +
                    `🚗 *Placa:* ${placa}%0A` +
                    `⚠️ *Falla:* ${falla}%0A` +
                    `----------------------------%0A` +
                    `📝 _Fotos guardadas en el sistema._`;

        const tel = "573000000000"; // CAMBIA ESTE NÚMERO
        window.open(`https://wa.me/${tel}?text=${msj}`, '_blank');
    }
</script>
</body>
</html>
