<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.R. — Reporte de Avería</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --azul: #004a99; --celeste: #e3f2fd; --blanco: #ffffff; --rojo: #dc2626; --gris: #f8fbff; --verde: #25d366; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--celeste); font-family: 'DM Sans', sans-serif; padding: 10px; }
        .container { max-width: 650px; margin: 0 auto; background: var(--blanco); border-radius: 20px; box-shadow: 0 10px 25px rgba(0,74,153,0.1); overflow: hidden; }
        
        /* CABECERA CON BOTÓN VOLVER */
        .header { background: var(--rojo); color: white; padding: 20px; text-align: center; position: relative; }
        .btn-volver { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.2); color: white; border: none; padding: 8px 14px; border-radius: 10px; font-weight: bold; font-size: 12px; cursor: pointer; }
        
        .content { padding: 20px; }
        .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: #546e7a; margin: 20px 0 10px; border-bottom: 2px solid var(--celeste); padding-bottom: 5px; font-weight: 700; }
        label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 5px; color: var(--azul); text-transform: uppercase; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border: 2px solid var(--celeste); border-radius: 10px; font-family: inherit; color: var(--azul); background: var(--gris); font-size: 14px; }
        
        .badge-usuario { background: #eef5ff; border: 2px solid var(--azul); font-weight: bold; }
        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-db { background: var(--rojo); color: white; }
        .preview-gallery { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
        .preview-gallery img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <button class="btn-volver" onclick="irAtras()">← VOLVER</button>
        <h2>⚠️ REPORTE DE AVERÍA</h2>
    </div>

    <div class="content">
        <div class="section-title">Datos del Responsable</div>
        <label>Reportado por</label>
        <input type="text" id="reportado_por" readonly class="badge-usuario">

        <label>Regional</label>
        <select id="regional">
            <option>Pereira</option>
            <option>Armenia</option>
            <option>Manizales</option>
            <option>Cali</option>
        </select>

        <div class="section-title">Información del Vehículo</div>
        <label>Seleccionar Carroza / Vehículo</label>
        <select id="selector_vehiculo">
            <option value="">Seleccione el vehículo...</option>
            <option value="GJX-497|Carroza GJX-497">Carroza GJX-497</option>
            <option value="ICQ-333|Carroza ICQ-333">Carroza ICQ-333</option>
            <option value="FURGON|Furgón de Apoyo">Furgón de Apoyo</option>
        </select>

        <div class="section-title">Detalles de la Falla</div>
        <label>Tipo de Falla</label>
        <select id="tipo_falla">
            <option value="">Seleccionar falla...</option>
            <option>Falla mecánica</option>
            <option>Falla eléctrica</option>
            <option>Llantas</option>
            <option>Carrocería</option>
        </select>

        <label>Descripción de Síntomas</label>
        <textarea id="sintomas" rows="3" placeholder="Describe la falla..."></textarea>

        <label>Fotos (Máx 2)</label>
        <input type="file" id="fotos-input" accept="image/*" multiple onchange="handleFotos(this)">
        <div id="galeria" class="preview-gallery"></div>

        <button class="btn-action btn-db" id="btn-envio" onclick="enviarReporte()">🚨 REGISTRAR REPORTE</button>
    </div>
</div>

<script>
    // --- IMPORTANTE: CONFIGURA TUS DATOS AQUÍ ---
    const URL_SUPA = "TU_URL_DE_SUPABASE";
    const KEY_SUPA = "TU_ANON_KEY";
    const _supabase = supabase.createClient(URL_SUPA, KEY_SUPA);

    let fotosArray = [];

    // 2. SOLUCIÓN CONDUCTOR: Carga el nombre desde el logueo
    window.onload = () => {
        const sesion = JSON.parse(localStorage.getItem('usuario_sesion') || localStorage.getItem('usuario_data') || '{}');
        document.getElementById('reportado_por').value = sesion.nombre || "Conductor No Detectado";
    };

    // 3. SOLUCIÓN BOTÓN VOLVER: Función para regresar al panel anterior
    function irAtras() {
        const sesion = JSON.parse(localStorage.getItem('usuario_sesion') || '{}');
        if (sesion.rol === 'admin') {
            window.location.href = "dashboard.html";
        } else {
            window.location.href = "panel_conductor.html";
        }
    }

    function handleFotos(el) {
        for (let file of el.files) {
            if (fotosArray.length < 2) {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    fotosArray.push(e.target.result);
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    document.getElementById('galeria').appendChild(img);
                };
            }
        }
    }

    // 1. SOLUCIÓN GUARDADO: Envío directo y validado
    async function enviarReporte() {
        const btn = document.getElementById('btn-envio');
        const selector = document.getElementById('selector_vehiculo').value;

        if(!selector) return alert("Por favor selecciona un vehículo.");
        const [placa, nombreVehiculo] = selector.split('|');

        const datos = {
            reportado_por: document.getElementById('reportado_por').value,
            regional: document.getElementById('regional').value,
            placa_vehiculo: placa,
            tipo_vehiculo: nombreVehiculo,
            tipo_falla: document.getElementById('tipo_falla').value,
            descripcion_sintomas: document.getElementById('sintomas').value,
            imagen1: fotosArray[0] || null,
            imagen2: fotosArray[1] || null,
            created_at: new Date()
        };

        btn.disabled = true;
        btn.innerText = "⏳ GUARDANDO...";

        const { error } = await _supabase.from('averias').insert([datos]);

        if (error) {
            alert("ERROR AL GUARDAR: " + error.message + "\n\nRevisa si activaste la Política RLS en Supabase.");
            btn.disabled = false;
            btn.innerText = "🚨 REINTENTAR ENVÍO";
        } else {
            alert("✅ REPORTE GUARDADO CON ÉXITO");
            irAtras(); // Regresa automáticamente al panel tras guardar
        }
    }
</script>
</body>
</html>
