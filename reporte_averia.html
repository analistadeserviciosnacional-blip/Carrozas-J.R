
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.R. — Reporte de Avería</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --azul: #004a99; --celeste: #e3f2fd; --blanco: #ffffff; --rojo: #dc2626; --gris: #f8fbff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--celeste); font-family: 'DM Sans', sans-serif; padding: 10px; }
        .container { max-width: 650px; margin: 0 auto; background: var(--blanco); border-radius: 20px; box-shadow: 0 10px 25px rgba(0,74,153,0.1); overflow: hidden; }
        .header { background: var(--rojo); color: white; padding: 20px; text-align: center; }
        .content { padding: 20px; }
        label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 5px; color: var(--azul); text-transform: uppercase; margin-top: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid var(--celeste); border-radius: 10px; font-family: inherit; font-size: 14px; background: var(--gris); }
        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 700; font-size: 16px; cursor: pointer; background: var(--rojo); color: white; margin-top: 20px; }
        .btn-action:disabled { background: #ccc; }
        .preview-gallery { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
        .preview-gallery img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h2>⚠️ REPORTE DE AVERÍA</h2></div>
    
    <div class="content">
        <label>Reportado por</label>
        <input type="text" id="reportado_por" readonly style="background:#eef5ff; font-weight:bold;">

        <label>Regional</label>
        <select id="regional">
            <option>Pereira</option>
            <option>Armenia</option>
            <option>Manizales</option>
            <option>Cali</option>
        </select>

        <label>Seleccionar Vehículo</label>
        <select id="selector_vehiculo">
            <option value="">Seleccione el vehículo...</option>
            <option value="GJX-497|Carroza GJX-497">Carroza GJX-497</option>
            <option value="ICQ-333|Carroza ICQ-333">Carroza ICQ-333</option>
            <option value="APOYO|Furgón de Apoyo">Furgón de Apoyo</option>
        </select>

        <label>Tipo de Falla</label>
        <select id="tipo_falla">
            <option value="">Seleccionar falla...</option>
            <option>Falla mecánica</option>
            <option>Falla eléctrica</option>
            <option>Llantas</option>
            <option>Carrocería</option>
        </select>

        <label>Descripción de Síntomas</label>
        <textarea id="sintomas" rows="3" placeholder="Detalle la falla aquí..."></textarea>

        <label>Fotos (Máx 2 para evitar errores de peso)</label>
        <input type="file" id="fotos-input" accept="image/*" multiple onchange="handleFotos(this)">
        <div id="galeria" class="preview-gallery"></div>

        <button class="btn-action" id="btn-envio" onclick="enviarReporte()">🚨 REGISTRAR EN SISTEMA</button>
    </div>
</div>

<script>
    // IMPORTANTE: REEMPLAZA CON TUS DATOS
    const URL_SUPA = "TU_URL_DE_SUPABASE";
    const KEY_SUPA = "TU_ANON_KEY";
    const _supabase = supabase.createClient(URL_SUPA, KEY_SUPA);

    let fotosArray = [];

    window.onload = () => {
        const sesion = JSON.parse(localStorage.getItem('usuario_sesion') || '{}');
        document.getElementById('reportado_por').value = sesion.nombre || "Conductor J.R.";
    };

    function handleFotos(el) {
        for (let file of el.files) {
            if (fotosArray.length < 2) {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    fotosArray.push(e.target.result);
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    document.getElementById('galeria').appendChild(img);
                };
            }
        }
    }

    async function enviarReporte() {
        const btn = document.getElementById('btn-envio');
        const vehiculoData = document.getElementById('selector_vehiculo').value.split('|');

        if(!vehiculoData[0]) return alert("Selecciona un vehículo");

        const datos = {
            reportado_por: document.getElementById('reportado_por').value,
            regional: document.getElementById('regional').value,
            placa_vehiculo: vehiculoData[0], // Toma la placa (Ej: GJX-497)
            tipo_vehiculo: vehiculoData[1],  // Toma el nombre (Ej: Carroza GJX-497)
            tipo_falla: document.getElementById('tipo_falla').value,
            descripcion_sintomas: document.getElementById('sintomas').value,
            imagen1: fotosArray[0] || null,
            imagen2: fotosArray[1] || null
        };

        btn.disabled = true;
        btn.innerText = "⏳ GUARDANDO...";

        const { error } = await _supabase.from('averias').insert([datos]);

        if (error) {
            alert("Error: " + error.message);
            btn.disabled = false;
            btn.innerText = "🚨 REINTENTAR";
        } else {
            alert("✅ REPORTE EXITOSO");
            location.reload();
        }
    }
</script>
</body>
</html>
