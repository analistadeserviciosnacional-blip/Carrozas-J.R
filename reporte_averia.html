<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.R. — Reporte de Avería</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --azul: #004a99; --celeste: #e3f2fd; --blanco: #ffffff; --rojo: #dc2626; --gris: #f8fbff; --verde: #25d366; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--celeste); font-family: 'DM Sans', sans-serif; padding: 10px; }
        .container { max-width: 650px; margin: 0 auto; background: var(--blanco); border-radius: 20px; box-shadow: 0 10px 25px rgba(0,74,153,0.1); overflow: hidden; }
        .header { background: var(--rojo); color: white; padding: 20px; text-align: center; }
        .header h2 { font-size: 18px; margin: 0; }
        .header p { font-size: 10px; opacity: 0.9; margin-top: 5px; font-weight: bold; }
        .content { padding: 20px; }
        .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: #546e7a; margin: 20px 0 10px; border-bottom: 2px solid var(--celeste); padding-bottom: 5px; font-weight: 700; }
        label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 5px; color: var(--azul); text-transform: uppercase; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border: 2px solid var(--celeste); border-radius: 10px; font-family: inherit; color: var(--azul); background: var(--gris); font-size: 14px; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--azul); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .upload-container { border: 2px dashed var(--rojo); border-radius: 15px; padding: 15px; text-align: center; background: #fff5f5; cursor: pointer; margin-bottom: 12px; }
        .preview-gallery { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
        .thumb-wrap { position: relative; width: 100%; aspect-ratio: 1/1; }
        .thumb-wrap img { width: 100%; height: 100%; border-radius: 8px; object-fit: cover; border: 1px solid #fecaca; }
        .btn-del { position: absolute; top: -5px; right: -5px; background: #ff4444; color: white; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-weight: bold; }
        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-db { background: var(--rojo); color: white; }
        .btn-wa { background: var(--verde); color: white; }
        .btn-action:disabled { opacity: 0.6; cursor: not-allowed; }
        /* Botones rediseñados */
        .acciones { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        .btn-accion-enviar {
            width: 100%; padding: 16px; border: none; border-radius: 14px;
            font-weight: 800; font-size: 15px; cursor: pointer;
            background: var(--rojo); color: white;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 4px 14px rgba(220,38,38,0.25); transition: 0.2s;
        }
        .btn-accion-enviar:disabled { opacity: 0.55; cursor: not-allowed; box-shadow: none; }
        .btn-accion-enviar:active { transform: scale(0.98); }
        .btn-accion-wa {
            width: 100%; padding: 16px; border: none; border-radius: 14px;
            font-weight: 800; font-size: 15px; cursor: pointer;
            background: #25d366; color: white;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 4px 14px rgba(37,211,102,0.3); transition: 0.2s;
        }
        .btn-accion-wa:active { transform: scale(0.98); }
        .btn-accion-volver {
            width: 100%; padding: 13px; border: 1.5px solid #e2e8f0; border-radius: 14px;
            font-weight: 600; font-size: 14px; cursor: pointer;
            background: transparent; color: #94a3b8;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: 0.2s;
        }
        .btn-accion-volver:active { background: #f1f5f9; }
        .badge-usuario { background: #eef5ff; border: 2px solid var(--azul); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>⚠️ REPORTE DE AVERÍA</h2>
        <p id="rol-info"></p>
    </div>

    <div class="content">
        <div class="section-title">Datos del Responsable</div>
        <div class="grid-2">
            <div>
                <label>Reportado por</label>
                <input type="text" id="reportado_por" readonly class="badge-usuario">
            </div>
            <div>
                <label>Regional</label>
                <select id="regional">
                    <option>Pereira</option><option>Armenia</option>
                    <option>Manizales</option><option>Cali</option>
                </select>
            </div>
        </div>

        <div class="section-title">Datos del Vehículo</div>
        <label>Seleccionar Vehículo</label>
        <select id="vehiculo">
            <option value="">Cargando flota...</option>
        </select>

        <div class="section-title">Síntomas y Descripción</div>
        <label>Tipo de Falla</label>
        <select id="tipo_falla">
            <option value="">Seleccionar tipo...</option>
            <option>Falla mecánica</option><option>Falla eléctrica</option>
            <option>Accidente / Golpe</option><option>Llantas</option><option>Otro</option>
        </select>

        <label>Descripción de Síntomas</label>
        <textarea id="sintomas" rows="3" placeholder="Describe brevemente la falla..."></textarea>

        <label>Observaciones Adicionales</label>
        <textarea id="observaciones" rows="2" placeholder="Notas extra para el taller..."></textarea>

        <div class="section-title">Evidencias Fotográficas (Máx. 4)</div>
        <div class="upload-container" onclick="document.getElementById('fotos-input').click()">
            <span id="upload-text">📸 Toca para subir fotos</span>
            <input type="file" id="fotos-input" accept="image/*" multiple hidden onchange="procesarFotos(this)">
        </div>
        <div class="preview-gallery" id="galeria"></div>

        <div class="acciones">
            <button class="btn-accion-enviar" id="btn-envio" onclick="guardarAveria()">
                <span>🚨</span> ENVIAR AVERÍA AL SISTEMA
            </button>
            <button class="btn-accion-wa" onclick="enviarWhatsAppAveria()">
                <span>💬</span> INFORMAR POR WHATSAPP
            </button>
            <button class="btn-accion-volver" onclick="irAtras()">
                ← Volver
            </button>
        </div>
    </div>
</div>

<script src="db.js"></script>
<script>
let fotosArray = [];

window.onload = async () => {
    const sesion = JSON.parse(localStorage.getItem('usuario_sesion') || '{}');
    if (!sesion.nombre) { window.location.href = 'index.html'; return; }

    document.getElementById('reportado_por').value = sesion.nombre;
    const esAdmin = (sesion.usuario || '').toLowerCase() === 'admin' || (sesion.rol || '').toLowerCase() === 'admin';
    document.getElementById('rol-info').innerText = "SESIÓN: " + (esAdmin ? "ADMINISTRADOR" : "CONDUCTOR");

    const select = document.getElementById('vehiculo');
    try {
        const res = await DB.obtenerFlota();
        if (res.data && res.data.length > 0) {
            select.innerHTML = '<option value="">Seleccionar...</option>';
            res.data.forEach(v => {
                let opt = document.createElement('option');
                opt.value = v.placa + '|' + (v.modelo || 'Vehículo');
                opt.textContent = v.placa + ' — ' + (v.modelo || '');
                select.appendChild(opt);
            });
        } else {
            select.innerHTML = '<option value="">No hay flota registrada</option>';
        }
    } catch (err) {
        select.innerHTML = '<option value="">Error al conectar</option>';
    }
};

function irAtras() {
    const sesion = JSON.parse(localStorage.getItem('usuario_sesion') || '{}');
    const esAdmin = (sesion.usuario || '').toLowerCase() === 'admin' || (sesion.rol || '').toLowerCase() === 'admin';
    window.location.href = esAdmin ? "dashboard.html" : "panel_conductor.html";
}

function procesarFotos(input) {
    for (let f of Array.from(input.files)) {
        if (fotosArray.length < 4) {
            const reader = new FileReader();
            reader.readAsDataURL(f);
            reader.onload = (e) => { fotosArray.push(e.target.result); renderGaleria(); };
        }
    }
}

function renderGaleria() {
    document.getElementById('galeria').innerHTML = fotosArray.map((img, i) =>
        '<div class="thumb-wrap"><img src="' + img + '"><button class="btn-del" onclick="eliminarFoto(' + i + ')">x</button></div>'
    ).join('');
    document.getElementById('upload-text').innerText = fotosArray.length + ' de 4 fotos cargadas';
}

function eliminarFoto(i) { fotosArray.splice(i, 1); renderGaleria(); }

async function guardarAveria() {
    const btn = document.getElementById('btn-envio');
    const v_select = document.getElementById('vehiculo').value;
    const falla = document.getElementById('tipo_falla').value;

    if (!v_select || !falla) {
        alert("Por favor selecciona el Vehículo y el Tipo de Falla");
        return;
    }

    const partes = v_select.split('|');
    const placa = partes[0];
    const nombreV = partes[1] || 'Vehículo';
    btn.disabled = true;
    btn.innerText = "Enviando...";

    const datos = {
        reportado_por:        document.getElementById('reportado_por').value,
        regional:             document.getElementById('regional').value,
        placa_vehiculo:       placa,
        tipo_vehiculo:        nombreV,
        tipo_falla:           falla,
        descripcion_sintomas: document.getElementById('sintomas').value,
        observaciones:        document.getElementById('observaciones').value,
        imagen1:              fotosArray[0] || "",
        imagen2:              fotosArray[1] || "",
        imagen3:              fotosArray[2] || "",
        imagen4:              fotosArray[3] || ""
    };

    try {
        const res = await DB.guardarAveria(datos);
        if (res.ok) {
            await DB.supabase.from('carrozas').update({ estado: 'En Taller' }).eq('placa', placa);
            btn.innerText = "AVERÍA REGISTRADA ✓";
            btn.style.background = "#16a34a";
            setTimeout(function() { irAtras(); }, 1500);
        } else {
            alert("Error al guardar: " + (res.error && res.error.message ? res.error.message : "Desconocido"));
            btn.disabled = false;
            btn.innerText = "ENVIAR AVERÍA AL SISTEMA";
        }
    } catch (e) {
        alert("Error de conexion");
        btn.disabled = false;
        btn.innerText = "ENVIAR AVERÍA AL SISTEMA";
    }
}

function enviarWhatsAppAveria() {
    const v_select = document.getElementById('vehiculo').value;
    if (!v_select) return alert("Seleccione vehiculo antes de enviar WhatsApp");
    const partes = v_select.split('|');
    const placa = partes[0];
    const nombreV = partes[1] || '';
    const msj = "*REPORTE DE AVERIA J.R.*\n\n" +
        "Vehiculo: " + placa + " - " + nombreV + "\n" +
        "Falla: " + document.getElementById('tipo_falla').value + "\n" +
        "Regional: " + document.getElementById('regional').value + "\n" +
        "Reportado por: " + document.getElementById('reportado_por').value + "\n" +
        "Sintomas: " + (document.getElementById('sintomas').value || '---') + "\n\n" +
        "Reporte generado desde App J.R.";
    window.open("https://wa.me/?text=" + encodeURIComponent(msj), '_blank');
}
</script>
</body>
</html>
