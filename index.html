<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.R. — Control de Acceso</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --azul-principal: #1a3a6d; --blanco: #ffffff; --gris-fondo: #f4f7f6; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #001f3f; 
            font-family: 'DM Sans', sans-serif; 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
        }
        .login-card { 
            background: var(--blanco); padding: 40px; border-radius: 20px; 
            width: 100%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center;
        }
        .logo-box { margin-bottom: 20px; }
        .logo-box img { width: 60px; }
        h1 { font-size: 22px; color: #1a3a6d; margin-bottom: 5px; }
        p { font-size: 12px; color: #666; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }
        
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 700; color: #1a3a6d; margin-bottom: 5px; }
        input { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; 
            font-size: 15px; background: #f9f9f9;
        }
        .btn-login { 
            width: 100%; padding: 15px; background: #3b71ca; color: white; 
            border: none; border-radius: 8px; font-weight: 700; cursor: pointer; 
            margin-top: 10px; transition: 0.3s;
        }
        .btn-login:hover { background: #2c5496; }
        #mensaje { color: #d32f2f; font-size: 13px; margin-top: 15px; font-weight: 500; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-box">
        <div style="font-size: 40px;">🚗</div>
    </div>
    <h1>J.R. TRASLADOS</h1>
    <p>Sistema de Gestión de Carrozas</p>

    <div class="input-group">
        <label>USUARIO</label>
        <input type="text" id="user" placeholder="Ej: admin">
    </div>

    <div class="input-group">
        <label>CONTRASEÑA</label>
        <input type="password" id="pass" placeholder="••••••••">
    </div>

    <button class="btn-login" id="btnEntrar" onclick="iniciarSesion()">INGRESAR AL SISTEMA</button>
    <div id="mensaje"></div>
</div>

<script src="db.js"></script>
<script>
    async function iniciarSesion() {
        const userVal = document.getElementById('user').value.trim();
        const passVal = document.getElementById('pass').value.trim();
        const btn = document.getElementById('btnEntrar');
        const msg = document.getElementById('mensaje');

        if(!userVal || !passVal) {
            msg.innerText = "Complete todos los campos";
            return;
        }

        btn.innerText = "VERIFICANDO...";
        btn.disabled = true;

        try {
            // Consulta exacta a tu tabla 'usuarios' según tu captura de pantalla
            const { data, error } = await DB.client
                .from('usuarios')
                .select('id, usuario, password, nombre') // Traemos el campo 'nombre' para el saludo
                .eq('usuario', userVal)
                .eq('password', passVal)
                .single();

            if (error || !data) {
                msg.innerText = "Error: Usuario o clave no coinciden";
                btn.innerText = "INGRESAR AL SISTEMA";
                btn.disabled = false;
            } else {
                // GUARDADO DE SESIÓN: Guardamos el objeto para que registro_salida.html lo use
                localStorage.setItem('usuario_sesion', JSON.stringify(data));
                
                msg.style.color = "#2e7d32";
                msg.innerText = "Acceso correcto. Redireccionando...";
                
                setTimeout(() => {
                    window.location.href = "registro_salida.html";
                }, 800);
            }
        } catch (err) {
            msg.innerText = "Error de conexión con el servidor";
            btn.disabled = false;
            btn.innerText = "INGRESAR AL SISTEMA";
        }
    }
</script>
</body>
</html>
