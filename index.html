<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.R. TRASLADOS — Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --azul-medio: #4a69bd; --azul-oscuro: #0a192f; --blanco: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--azul-oscuro); 
            font-family: 'DM Sans', sans-serif; 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
        }
        .login-card { 
            background: var(--blanco); padding: 40px 30px; border-radius: 20px; 
            width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .logo { font-size: 40px; margin-bottom: 10px; }
        h2 { color: #1a3a6d; font-size: 20px; margin-bottom: 5px; }
        p { color: #666; font-size: 12px; margin-bottom: 30px; letter-spacing: 1px; }
        
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 11px; font-weight: 700; color: #1a3a6d; margin-bottom: 8px; }
        input { 
            width: 100%; padding: 14px; border: 1px solid #e0e0e0; border-radius: 10px; 
            font-size: 16px; background: #f8f9fa; outline: none;
        }
        input:focus { border-color: var(--azul-medio); background: #fff; }
        
        .btn-login { 
            width: 100%; padding: 16px; background: #3f51b5; color: white; 
            border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 15px;
        }
        #error-msg { color: #ff5252; font-size: 13px; margin-top: 15px; font-weight: 500; display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">🚗</div>
    <h2>J.R. TRASLADOS</h2>
    <p>SISTEMA DE GESTIÓN DE CARROZAS</p>

    <div class="input-group">
        <label>USUARIO</label>
        <input type="text" id="userInput" placeholder="Ej: Cesar Augusto">
    </div>

    <div class="input-group">
        <label>CONTRASEÑA</label>
        <input type="password" id="passInput" placeholder="••••">
    </div>

    <button class="btn-login" id="btnLogin" onclick="validarAcceso()">INGRESAR AL SISTEMA</button>
    <div id="error-msg">Error de conexión con el servidor</div>
</div>

<script src="db.js"></script>

<script>
    async function validarAcceso() {
        const user = document.getElementById('userInput').value.trim();
        const pass = document.getElementById('passInput').value.trim();
        const btn = document.getElementById('btnLogin');
        const errorDiv = document.getElementById('error-msg');

        if (!user || !pass) {
            errorDiv.innerText = "Por favor completa todos los campos";
            errorDiv.style.display = "block";
            return;
        }

        btn.innerText = "VERIFICANDO...";
        btn.disabled = true;
        errorDiv.style.display = "none";

        try {
            // Buscamos en la tabla 'usuarios' según tus capturas
            const { data, error } = await DB.client
                .from('usuarios')
                .select('id, usuario, password, nombre')
                .eq('usuario', user)
                .eq('password', pass)
                .single();

            if (error || !data) {
                errorDiv.innerText = "Usuario o contraseña incorrectos";
                errorDiv.style.display = "block";
                btn.innerText = "INGRESAR AL SISTEMA";
                btn.disabled = false;
            } else {
                // ÉXITO: Guardamos la sesión y el nombre para el saludo
                localStorage.setItem('usuario_sesion', JSON.stringify(data));
                window.location.href = "registro_salida.html";
            }
        } catch (err) {
            console.error(err);
            errorDiv.innerText = "Error de conexión con el servidor";
            errorDiv.style.display = "block";
            btn.innerText = "INGRESAR AL SISTEMA";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
