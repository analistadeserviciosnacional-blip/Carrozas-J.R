<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.R. — Control de Acceso Corporativo</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
    --azul: #004a99; --azul-cielo: #e3f2fd; --blanco: #ffffff;
    --texto: #1a3a6d; --exito: #10b981;
}
body {
    background: linear-gradient(135deg, var(--azul-cielo) 0%, #bbdefb 100%);
    font-family: 'DM Sans', sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; margin: 0;
}
.login-card {
    background: var(--blanco); padding: 40px 30px; border-radius: 32px;
    width: 100%; max-width: 360px;
    box-shadow: 0 25px 50px rgba(0,74,153,0.15);
    text-align: center;
}
.logo {
    width: 70px; height: 70px; background: var(--azul); border-radius: 20px;
    margin: 0 auto 15px; display: flex; align-items: center; justify-content: center;
    color: white; font-size: 26px; font-weight: 800; transform: rotate(-5deg);
    box-shadow: 0 10px 20px rgba(0,74,153,0.2);
}
h2 { color: var(--texto); font-size: 24px; margin-bottom: 5px; font-weight: 700; }
p  { color: #64748b; font-size: 14px; margin-bottom: 25px; }
input, select {
    width: 100%; padding: 15px; margin-bottom: 12px;
    border: 1.5px solid #e2e8f0; border-radius: 14px;
    background: #f8fafc; box-sizing: border-box;
    outline: none; font-size: 15px; font-family: inherit; transition: 0.2s;
}
input:focus, select:focus { border-color: var(--azul); background: white; }
.btn {
    width: 100%; padding: 16px; border: none; border-radius: 14px;
    font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.2s;
    margin-top: 5px; box-shadow: 0 8px 15px rgba(0,74,153,0.2);
}
.btn-azul  { background: var(--azul);  color: white; }
.btn-verde { background: var(--exito); color: white; }
.btn-gris  { background: transparent; color: #94a3b8; border: 1.5px solid #e2e8f0; box-shadow: none; margin-top: 8px; }
.btn:disabled { background: #94a3b8; cursor: not-allowed; }
.link-reg { color: var(--azul); font-weight: 700; cursor: pointer; display: block; margin-top: 20px; font-size: 14px; }
#error-msg { color: #e11d48; font-size: 13px; margin-top: 12px; display: none; background: #fff1f2; padding: 10px; border-radius: 10px; }

/* MODAL */
.modal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,74,153,0.3); backdrop-filter: blur(4px); align-items: center; justify-content: center; }
.modal.open { display: flex; }
.modal-box {
    background: white; padding: 28px 24px; border-radius: 28px;
    width: 92%; max-width: 400px; max-height: 92vh; overflow-y: auto;
    text-align: center;
}
.modal-box h2 { font-size: 20px; color: var(--texto); margin-bottom: 4px; }
.modal-box p  { font-size: 13px; color: #64748b; margin-bottom: 18px; }

/* CARROZA BADGE */
.carroza-badge {
    display: none; background: #ecfdf5; border: 1.5px solid #6ee7b7;
    border-radius: 10px; padding: 10px 14px; margin-bottom: 10px;
    text-align: left; font-size: 13px; color: #065f46; font-weight: 600;
    align-items: center; justify-content: space-between;
}
.btn-limpiar { background: none; border: none; color: #ef4444; font-size: 16px; cursor: pointer; padding: 0; }
.btn-carroza {
    width: 100%; padding: 13px; border: 2px dashed #cbd5e1; border-radius: 12px;
    background: #f8fafc; color: #64748b; font-weight: 700; font-size: 14px;
    cursor: pointer; font-family: inherit;
}
.separador { border-top: 1.5px solid #e2e8f0; margin: 14px 0; }
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div class="login-card">
    <div class="logo">JR</div>
    <h2>Bienvenido</h2>
    <p>Inicia sesión para continuar</p>
    <input type="text"     id="user" placeholder="Usuario o Cédula">
    <input type="password" id="pass" placeholder="Contraseña">
    <button class="btn btn-azul" id="btn-login" onclick="login()">INGRESAR AL SISTEMA</button>
    <span class="link-reg" onclick="abrirRegistro()">¿No tienes cuenta? Regístrate aquí</span>
    <div id="error-msg"></div>
</div>

<!-- ── MODAL REGISTRO ── -->
<div class="modal" id="modal-registro">
    <div class="modal-box">
        <h2>Crear Cuenta Nueva</h2>
        <p>Completa tus datos de acceso</p>

        <input type="text"     id="r-nombre"   placeholder="Nombre Completo *">
        <input type="text"     id="r-usuario"  placeholder="Cédula (Usuario) *">
        <input type="text"     id="r-telefono" placeholder="Teléfono">
        <input type="password" id="r-password" placeholder="Contraseña *">

        <select id="r-rol">
            <option value="">— Selecciona tu Rol —</option>
            <option value="conductor">Conductor</option>
            <option value="coordinador">Coordinador</option>
            <option value="admin">Administrador</option>
        </select>

        <select id="r-regional">
            <option value="">— Selecciona tu Regional —</option>
            <option value="Pereira">Pereira</option>
            <option value="Manizales">Manizales</option>
            <option value="Armenia">Armenia</option>
            <option value="Medellín">Medellín</option>
            <option value="Bogotá">Bogotá</option>
            <option value="Cali">Cali</option>
            <option value="Antioquia">Antioquia</option>
            <option value="Risaralda">Risaralda</option>
            <option value="Caldas">Caldas</option>
            <option value="Quindío">Quindío</option>
            <option value="Valle">Valle</option>
        </select>

        <div class="separador"></div>

        <!-- Carroza badge (se muestra al seleccionar) -->
        <div class="carroza-badge" id="carroza-badge">
            <span id="carroza-badge-texto">🚗</span>
            <button class="btn-limpiar" onclick="limpiarCarroza()">✕</button>
        </div>
        <button class="btn-carroza" id="btn-agregar-carroza" onclick="abrirModalCarroza()">
            🚗 Agregar mi Carroza (opcional)
        </button>
        <input type="hidden" id="r-placa">
        <input type="hidden" id="r-placa-nueva">
        <input type="hidden" id="r-modelo-nuevo">

        <div class="separador"></div>

        <button class="btn btn-verde" id="btn-registrar" onclick="ejecutarRegistro()">REGISTRARME</button>
        <button class="btn btn-gris" onclick="cerrarRegistro()">← Volver al inicio</button>
    </div>
</div>

<!-- ── MODAL CARROZA ── -->
<div class="modal" id="modal-carroza">
    <div class="modal-box">
        <h2>🚗 Tu Carroza</h2>
        <p>Selecciona la tuya o registra una nueva</p>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:18px;">
            <button id="tab-existente" onclick="switchTab('existente')"
                style="padding:11px; border-radius:10px; border:2px solid #e2e8f0; background:#f8fafc; color:#64748b; font-weight:700; font-size:13px; cursor:pointer; font-family:inherit;">
                📋 Ya existe
            </button>
            <button id="tab-nueva" onclick="switchTab('nueva')"
                style="padding:11px; border-radius:10px; border:2px solid #004a99; background:#004a99; color:white; font-weight:700; font-size:13px; cursor:pointer; font-family:inherit;">
                ➕ Es nueva
            </button>
        </div>

        <!-- Panel existente -->
        <div id="panel-existente" style="display:none;">
            <label style="font-size:11px; font-weight:700; color:#64748b; text-transform:uppercase; display:block; margin-bottom:6px;">Selecciona tu placa</label>
            <select id="sel-placa-existente" style="margin-bottom:0;">
                <option value="">Cargando...</option>
            </select>
        </div>

        <!-- Panel nueva -->
        <div id="panel-nueva">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div>
                    <label style="font-size:10px; font-weight:700; color:#64748b; text-transform:uppercase; display:block; margin-bottom:4px;">Placa *</label>
                    <input type="text" id="n-placa" placeholder="PFO-147" style="text-transform:uppercase; margin-bottom:0;">
                </div>
                <div>
                    <label style="font-size:10px; font-weight:700; color:#64748b; text-transform:uppercase; display:block; margin-bottom:4px;">Modelo *</label>
                    <input type="text" id="n-modelo" placeholder="Sprinter" style="margin-bottom:0;">
                </div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;">
                <div>
                    <label style="font-size:10px; font-weight:700; color:#64748b; text-transform:uppercase; display:block; margin-bottom:4px;">Año</label>
                    <input type="number" id="n-anio" placeholder="2020" style="margin-bottom:0;">
                </div>
                <div>
                    <label style="font-size:10px; font-weight:700; color:#64748b; text-transform:uppercase; display:block; margin-bottom:4px;">Fecha Ingreso</label>
                    <input type="date" id="n-fecha-ingreso" style="margin-bottom:0;">
                </div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;">
                <div>
                    <label style="font-size:10px; font-weight:700; color:#64748b; text-transform:uppercase; display:block; margin-bottom:4px;">KM Inicial</label>
                    <input type="number" id="n-km-ini" value="0" style="margin-bottom:0;">
                </div>
                <div>
                    <label style="font-size:10px; font-weight:700; color:#64748b; text-transform:uppercase; display:block; margin-bottom:4px;">KM Actual</label>
                    <input type="number" id="n-km-act" value="0" style="margin-bottom:0;">
                </div>
            </div>
            <div style="margin-top:10px;">
                <label style="font-size:10px; font-weight:700; color:#64748b; text-transform:uppercase; display:block; margin-bottom:4px;">Estado</label>
                <select id="n-estado" style="margin-bottom:0;">
                    <option value="Disponible">Disponible</option>
                    <option value="En Servicio">En Servicio</option>
                    <option value="En Taller">En Taller</option>
                </select>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;">
                <div>
                    <label style="font-size:10px; font-weight:700; color:#64748b; text-transform:uppercase; display:block; margin-bottom:4px;">Último Mant.</label>
                    <input type="date" id="n-ult-mant" style="margin-bottom:0;">
                </div>
                <div>
                    <label style="font-size:10px; font-weight:700; color:#64748b; text-transform:uppercase; display:block; margin-bottom:4px;">Próximo Mant.</label>
                    <input type="date" id="n-prox-mant" style="margin-bottom:0;">
                </div>
            </div>
            <div style="margin-top:10px;">
                <label style="font-size:10px; font-weight:700; color:#64748b; text-transform:uppercase; display:block; margin-bottom:4px;">Observaciones</label>
                <textarea id="n-obs" rows="2" placeholder="Detalles..."
                    style="width:100%; padding:11px; border:1.5px solid #e2e8f0; border-radius:10px; font-size:14px; font-family:inherit; box-sizing:border-box; background:#f8fafc; resize:none; outline:none;"></textarea>
            </div>
        </div>

        <div style="display:flex; gap:10px; margin-top:18px;">
            <button onclick="cerrarModalCarroza()"
                style="flex:1; padding:12px; border:1.5px solid #e2e8f0; border-radius:10px; background:white; color:#64748b; font-weight:700; cursor:pointer; font-family:inherit;">
                Cancelar
            </button>
            <button onclick="confirmarCarroza()"
                style="flex:2; padding:12px; border:none; border-radius:10px; background:#004a99; color:white; font-weight:800; cursor:pointer; font-family:inherit;">
                CONFIRMAR
            </button>
        </div>
    </div>
</div>

<script src="db.js"></script>
<script>
// ── HELPERS ──────────────────────────────────────────
const norm = s => (s||'').toLowerCase().trim()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'');

function mostrarError(msg) {
    const d = document.getElementById('error-msg');
    d.innerText = msg; d.style.display = 'block';
}

// ── LOGIN ─────────────────────────────────────────────
async function login() {
    const u   = document.getElementById('user').value.trim();
    const p   = document.getElementById('pass').value.trim();
    const btn = document.getElementById('btn-login');

    if (!u || !p) { mostrarError("Ingresa usuario y contraseña"); return; }
    btn.disabled = true; btn.innerText = "VERIFICANDO...";
    document.getElementById('error-msg').style.display = 'none';

    try {
        const res = await DB.login(u, p);
        if (res.ok && res.data) {
            localStorage.setItem('usuario_sesion', JSON.stringify(res.data));
            const rol = norm(res.data.rol);
            const usr = norm(res.data.usuario || u);

            if (rol === 'admin' || rol === 'administracion' || usr === 'admin') {
                window.location.href = 'dashboard.html';
            } else if (rol === 'coordinador') {
                window.location.href = 'panel_coordinador.html';
            } else {
                window.location.href = 'panel_conductor.html';
            }
        } else {
            mostrarError("Usuario o contraseña incorrectos");
        }
    } catch(e) {
        mostrarError("Error: " + e.message);
    } finally {
        btn.disabled = false; btn.innerText = "INGRESAR AL SISTEMA";
    }
}

document.addEventListener('keypress', e => {
    if (e.key === 'Enter') {
        if (document.getElementById('modal-registro').classList.contains('open')) ejecutarRegistro();
        else login();
    }
});

// ── REGISTRO ──────────────────────────────────────────
function abrirRegistro() {
    document.getElementById('modal-registro').classList.add('open');
    document.getElementById('error-msg').style.display = 'none';
}
function cerrarRegistro() {
    document.getElementById('modal-registro').classList.remove('open');
}

async function ejecutarRegistro() {
    const btn      = document.getElementById('btn-registrar');
    const nombre   = document.getElementById('r-nombre').value.trim();
    const usuario  = document.getElementById('r-usuario').value.trim();
    const telefono = document.getElementById('r-telefono').value.trim();
    const password = document.getElementById('r-password').value.trim();
    const rol      = document.getElementById('r-rol').value;
    const regional = document.getElementById('r-regional').value;

    if (!nombre || !usuario || !password) {
        alert("Nombre, Cédula y Contraseña son obligatorios"); return;
    }
    if (!rol)      { alert("Selecciona tu Rol");      return; }
    if (!regional) { alert("Selecciona tu Regional"); return; }

    const placaExistente = document.getElementById('r-placa').value;
    const placaNueva     = document.getElementById('r-placa-nueva').value.trim().toUpperCase();
    const modeloNuevo    = document.getElementById('r-modelo-nuevo').value.trim();

    btn.disabled = true; btn.innerText = "PROCESANDO...";

    try {
        // 1. Insertar usuario con columnas exactas de Supabase
        const { error } = await DB.supabase
            .from('usuarios')
            .insert([{
                nombre:   nombre,
                usuario:  usuario,
                password: password,    // columna real
                telefono: telefono,    // columna real
                rol:      rol,
                regional: regional
            }]);
        if (error) throw error;

        // 2. Asignar carroza existente
        if (placaExistente) {
            await DB.supabase.from('carrozas')
                .update({ conductor_asignado: nombre })
                .eq('placa', placaExistente);
        }

        // 3. Crear carroza nueva
        if (placaNueva) {
            const extraRaw = document.getElementById('r-placa-nueva').dataset.extra;
            const extra = extraRaw ? JSON.parse(extraRaw) : {};
            await DB.supabase.from('carrozas').insert([{
                placa:                 placaNueva,
                modelo:                modeloNuevo || 'Sin modelo',
                conductor_asignado:    nombre,
                anio:                  extra.anio || null,
                fecha_ingreso_empresa: extra.fecha_ingreso_empresa || null,
                kilometraje_inicial:   extra.kilometraje_inicial || 0,
                kilometraje_actual:    extra.kilometraje_actual  || 0,
                estado:                extra.estado || 'Disponible',
                ultimo_mantenimiento:  extra.ultimo_mantenimiento  || null,
                proximo_mantenimiento: extra.proximo_mantenimiento || null,
                observaciones:         extra.observaciones || ''
            }]);
        }

        alert("¡Registro exitoso! Ya puedes iniciar sesión.");
        cerrarRegistro();
        document.getElementById('user').value = usuario;
        document.getElementById('pass').value = password;

    } catch(e) {
        alert("Error en el registro: " + e.message);
    } finally {
        btn.disabled = false; btn.innerText = "REGISTRARME";
    }
}

// ── MODAL CARROZA ─────────────────────────────────────
let tabActivo = 'nueva';

document.addEventListener('DOMContentLoaded', () => {
    const hoy = new Date().toISOString().split('T')[0];
    document.getElementById('n-fecha-ingreso').value = hoy;
});

function abrirModalCarroza() {
    document.getElementById('modal-carroza').classList.add('open');
    switchTab('nueva');
    // Cargar flota para tab existente
    const sel = document.getElementById('sel-placa-existente');
    sel.innerHTML = '<option value="">Cargando...</option>';
    DB.supabase.from('carrozas').select('placa, modelo').order('placa').then(({ data }) => {
        if (data && data.length > 0) {
            sel.innerHTML = '<option value="">— Selecciona tu placa —</option>' +
                data.map(c => '<option value="' + c.placa + '">' + c.placa + (c.modelo ? ' — ' + c.modelo : '') + '</option>').join('');
        } else {
            sel.innerHTML = '<option value="">No hay carrozas registradas</option>';
        }
    }).catch(() => { sel.innerHTML = '<option value="">Error al cargar</option>'; });
}

function cerrarModalCarroza() {
    document.getElementById('modal-carroza').classList.remove('open');
}

function switchTab(tab) {
    tabActivo = tab;
    document.getElementById('panel-existente').style.display = tab === 'existente' ? 'block' : 'none';
    document.getElementById('panel-nueva').style.display     = tab === 'nueva'     ? 'block' : 'none';
    const base = 'padding:11px; border-radius:10px; font-weight:700; font-size:13px; cursor:pointer; font-family:inherit;';
    document.getElementById('tab-existente').style.cssText = base +
        (tab === 'existente' ? 'border:2px solid #004a99; background:#004a99; color:white;'
                             : 'border:2px solid #e2e8f0; background:#f8fafc; color:#64748b;');
    document.getElementById('tab-nueva').style.cssText = base +
        (tab === 'nueva' ? 'border:2px solid #004a99; background:#004a99; color:white;'
                         : 'border:2px solid #e2e8f0; background:#f8fafc; color:#64748b;');
}

function confirmarCarroza() {
    if (tabActivo === 'existente') {
        const sel = document.getElementById('sel-placa-existente');
        if (!sel.value) { alert('Selecciona una placa'); return; }
        document.getElementById('r-placa').value       = sel.value;
        document.getElementById('r-placa-nueva').value = '';
        mostrarBadgeCarroza('🚗 ' + sel.options[sel.selectedIndex].text);
    } else {
        const placa  = document.getElementById('n-placa').value.trim().toUpperCase();
        const modelo = document.getElementById('n-modelo').value.trim();
        if (!placa)  { alert('La placa es obligatoria'); return; }
        if (!modelo) { alert('El modelo es obligatorio'); return; }
        document.getElementById('r-placa').value        = '';
        document.getElementById('r-placa-nueva').value  = placa;
        document.getElementById('r-modelo-nuevo').value = modelo;
        const extra = {
            anio:                  parseInt(document.getElementById('n-anio').value) || null,
            fecha_ingreso_empresa: document.getElementById('n-fecha-ingreso').value || null,
            kilometraje_inicial:   parseInt(document.getElementById('n-km-ini').value) || 0,
            kilometraje_actual:    parseInt(document.getElementById('n-km-act').value) || 0,
            estado:                document.getElementById('n-estado').value,
            ultimo_mantenimiento:  document.getElementById('n-ult-mant').value || null,
            proximo_mantenimiento: document.getElementById('n-prox-mant').value || null,
            observaciones:         document.getElementById('n-obs').value.trim()
        };
        document.getElementById('r-placa-nueva').dataset.extra = JSON.stringify(extra);
        mostrarBadgeCarroza('🚗 ' + placa + ' — ' + modelo + ' (nueva)');
    }
    cerrarModalCarroza();
}

function mostrarBadgeCarroza(texto) {
    document.getElementById('carroza-badge-texto').textContent = texto;
    document.getElementById('carroza-badge').style.display = 'flex';
    document.getElementById('btn-agregar-carroza').style.display = 'none';
}

function limpiarCarroza() {
    document.getElementById('r-placa').value        = '';
    document.getElementById('r-placa-nueva').value  = '';
    document.getElementById('r-modelo-nuevo').value = '';
    document.getElementById('carroza-badge').style.display      = 'none';
    document.getElementById('btn-agregar-carroza').style.display = 'block';
}
</script>
</body>
</html>
