<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.R. — Control de Acceso Corporativo</title>
<!-- Eliminado: Script de Supabase -->
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
    --azul: #004a99; --azul-cielo: #e3f2fd; --blanco: #ffffff;
    --texto: #1a3a6d; --exito: #10b981;
}
body {
    background: linear-gradient(135deg, var(--azul-cielo) 0%, #bbdefb 100%);
    font-family: 'DM Sans', sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; margin: 0;
}
.login-card {
    background: var(--blanco); padding: 40px 30px; border-radius: 32px;
    width: 100%; max-width: 360px;
    box-shadow: 0 25px 50px rgba(0,74,153,0.15);
    text-align: center;
}
.logo {
    width: 70px; height: 70px; background: var(--azul); border-radius: 20px;
    margin: 0 auto 15px; display: flex; align-items: center; justify-content: center;
    color: white; font-size: 26px; font-weight: 800; transform: rotate(-5deg);
    box-shadow: 0 10px 20px rgba(0,74,153,0.2);
}
h2 { color: var(--texto); font-size: 24px; margin-bottom: 5px; font-weight: 700; }
p  { color: #64748b; font-size: 14px; margin-bottom: 25px; }
input, select {
    width: 100%; padding: 15px; margin-bottom: 12px;
    border: 1.5px solid #e2e8f0; border-radius: 14px;
    background: #f8fafc; box-sizing: border-box;
    outline: none; font-size: 15px; font-family: inherit; transition: 0.2s;
}
input:focus, select:focus { border-color: var(--azul); background: white; }
.btn {
    width: 100%; padding: 16px; border: none; border-radius: 14px;
    font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.2s;
    margin-top: 5px; box-shadow: 0 8px 15px rgba(0,74,153,0.2);
}
.btn-azul  { background: var(--azul);  color: white; }
.btn-verde { background: var(--exito); color: white; }
.btn-gris  { background: transparent; color: #94a3b8; border: 1.5px solid #e2e8f0; box-shadow: none; margin-top: 8px; }
.btn:disabled { background: #94a3b8; cursor: not-allowed; }
.link-reg { color: var(--azul); font-weight: 700; cursor: pointer; display: block; margin-top: 20px; font-size: 14px; }
#error-msg { color: #e11d48; font-size: 13px; margin-top: 12px; display: none; background: #fff1f2; padding: 10px; border-radius: 10px; }

.modal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,74,153,0.3); backdrop-filter: blur(4px); align-items: center; justify-content: center; }
.modal.open { display: flex; }
.modal-box {
    background: white; padding: 28px 24px; border-radius: 28px;
    width: 92%; max-width: 400px; max-height: 92vh; overflow-y: auto;
    text-align: center;
}
.modal-box h2 { font-size: 20px; color: var(--texto); margin-bottom: 4px; }
.modal-box p  { font-size: 13px; color: #64748b; margin-bottom: 18px; }

.carroza-badge {
    display: none; background: #ecfdf5; border: 1.5px solid #6ee7b7;
    border-radius: 10px; padding: 10px 14px; margin-bottom: 10px;
    text-align: left; font-size: 13px; color: #065f46; font-weight: 600;
    align-items: center; justify-content: space-between;
}
.btn-limpiar { background: none; border: none; color: #ef4444; font-size: 16px; cursor: pointer; padding: 0; }
.btn-carroza {
    width: 100%; padding: 13px; border: 2px dashed #cbd5e1; border-radius: 12px;
    background: #f8fafc; color: #64748b; font-weight: 700; font-size: 14px;
    cursor: pointer; font-family: inherit;
}
.separador { border-top: 1.5px solid #e2e8f0; margin: 14px 0; }
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div class="login-card">
    <div class="logo">JR</div>
    <h2>Bienvenido</h2>
    <p>Inicia sesión para continuar</p>
    <input type="text"     id="user" placeholder="Usuario o Cédula">
    <input type="password" id="pass" placeholder="Contraseña">
    <button class="btn btn-azul" id="btn-login" onclick="login()">INGRESAR AL SISTEMA</button>
    <span class="link-reg" onclick="abrirRegistro()">¿No tienes cuenta? Regístrate aquí</span>
    <div id="error-msg"></div>
</div>

<!-- ── MODAL REGISTRO ── -->
<div class="modal" id="modal-registro">
    <div class="modal-box">
        <h2>Crear Cuenta Nueva</h2>
        <p>Completa tus datos de acceso</p>

        <input type="text"     id="r-nombre"   placeholder="Nombre Completo *">
        <input type="text"     id="r-usuario"  placeholder="Cédula (Usuario) *">
        <input type="text"     id="r-telefono" placeholder="Teléfono">
        <input type="password" id="r-password" placeholder="Contraseña *">

        <select id="r-rol">
            <option value="">— Selecciona tu Rol —</option>
            <option value="conductor">Conductor</option>
            <option value="coordinador">Coordinador</option>
            <option value="admin">Administrador</option>
        </select>

        <select id="r-regional">
            <option value="">— Selecciona tu Regional —</option>
            <option value="Tolima Sur">Tolima Sur</option>
            <option value="Valle Sur">Valle Sur</option>
            <option value="Antioquia">Antioquia</option>
            <option value="Tolima Norte">Tolima Norte</option>
            <option value="Valle Centro">Valle Centro</option>
            <option value="Valle Centro Palmira">Valle Centro Palmira</option>
            <option value="Risaralda">Risaralda</option>
            <option value="Caldas">Caldas</option>
            <option value="Quindío">Quindío</option>
            <option value="Valle Norte">Valle Norte</option>
        </select>

        <div class="separador"></div>

        <div class="carroza-badge" id="carroza-badge">
            <span id="carroza-badge-texto">🚗</span>
            <button class="btn-limpiar" onclick="limpiarCarroza()">✕</button>
        </div>
        <button class="btn-carroza" id="btn-agregar-carroza" onclick="abrirModalCarroza()">
            🚗 Agregar mi Carroza (opcional)
        </button>
        <input type="hidden" id="r-placa">
        <input type="hidden" id="r-placa-nueva">
        <input type="hidden" id="r-modelo-nuevo">

        <div class="separador"></div>

        <button class="btn btn-verde" id="btn-registrar" onclick="ejecutarRegistro()">REGISTRARME</button>
        <button class="btn btn-gris" onclick="cerrarRegistro()">← Volver al inicio</button>
    </div>
</div>

<!-- ── MODAL CARROZA ── -->
<div class="modal" id="modal-carroza">
    <div class="modal-box">
        <h2>🚗 Tu Carroza</h2>
        <p>Selecciona la tuya o registra una nueva</p>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:18px;">
            <button id="tab-existente" onclick="switchTab('existente')" style="padding:11px; border-radius:10px; border:2px solid #e2e8f0; background:#f8fafc; color:#64748b; font-weight:700; font-size:13px; cursor:pointer; font-family:inherit;">📋 Ya existe</button>
            <button id="tab-nueva" onclick="switchTab('nueva')" style="padding:11px; border-radius:10px; border:2px solid #004a99; background:#004a99; color:white; font-weight:700; font-size:13px; cursor:pointer; font-family:inherit;">➕ Es nueva</button>
        </div>

        <div id="panel-existente" style="display:none;">
            <label style="font-size:11px; font-weight:700; color:#64748b; text-transform:uppercase; display:block; margin-bottom:6px;">Selecciona tu placa</label>
            <select id="sel-placa-existente" style="margin-bottom:0;">
                <option value="">Cargando...</option>
            </select>
        </div>

        <div id="panel-nueva">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div>
                    <label style="font-size:10px; font-weight:700; color:#64748b; text-transform:uppercase; display:block; margin-bottom:4px;">Placa *</label>
                    <input type="text" id="n-placa" placeholder="PFO-147" style="text-transform:uppercase; margin-bottom:0;">
                </div>
                <div>
                    <label style="font-size:10px; font-weight:700; color:#64748b; text-transform:uppercase; display:block; margin-bottom:4px;">Modelo *</label>
                    <input type="text" id="n-modelo" placeholder="Sprinter" style="margin-bottom:0;">
                </div>
            </div>
            <!-- Otros campos de carroza simplificados para el registro inicial -->
        </div>

        <div style="display:flex; gap:10px; margin-top:18px;">
            <button onclick="cerrarModalCarroza()" style="flex:1; padding:12px; border:1.5px solid #e2e8f0; border-radius:10px; background:white; color:#64748b; font-weight:700; cursor:pointer; font-family:inherit;">Cancelar</button>
            <button onclick="confirmarCarroza()" style="flex:2; padding:12px; border:none; border-radius:10px; background:#004a99; color:white; font-weight:800; cursor:pointer; font-family:inherit;">CONFIRMAR</button>
        </div>
    </div>
</div>

<script src="db.js"></script>
<script>
const norm = s => (s||'').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

function mostrarError(msg) {
    const d = document.getElementById('error-msg');
    d.innerText = msg; d.style.display = 'block';
}

async function login() {
    const u   = document.getElementById('user').value.trim();
    const p   = document.getElementById('pass').value.trim();
    const btn = document.getElementById('btn-login');

    if (!u || !p) { mostrarError("Ingresa usuario y contraseña"); return; }
    btn.disabled = true; btn.innerText = "VERIFICANDO...";
    document.getElementById('error-msg').style.display = 'none';

    try {
        const res = await DB.login(u, p);
        if (res.ok && res.data) {
            localStorage.setItem('usuario_sesion', JSON.stringify(res.data));
            const rol = norm(res.data.rol);
            const usr = norm(res.data.usuario || u);

            if (rol === 'admin' || rol === 'administrador' || usr === 'admin') {
                window.location.href = 'dashboard.html';
            } else if (rol === 'coordinador') {
                window.location.href = 'panel_coordinador.html';
            } else {
                window.location.href = 'panel_conductor.html';
            }
        } else {
            mostrarError("Usuario o contraseña incorrectos");
        }
    } catch(e) {
        mostrarError("Error de conexión con el Excel");
    } finally {
        btn.disabled = false; btn.innerText = "INGRESAR AL SISTEMA";
    }
}

function abrirRegistro() {
    document.getElementById('modal-registro').classList.add('open');
}

function cerrarRegistro() {
    document.getElementById('modal-registro').classList.remove('open');
}

async function ejecutarRegistro() {
    const btn      = document.getElementById('btn-registrar');
    const nombre   = document.getElementById('r-nombre').value.trim();
    const usuario  = document.getElementById('r-usuario').value.trim();
    const telefono = document.getElementById('r-telefono').value.trim();
    const password = document.getElementById('r-password').value.trim();
    const rol      = document.getElementById('r-rol').value;
    const regional = document.getElementById('r-regional').value;

    if (!nombre || !usuario || !password || !rol || !regional) {
        alert("Todos los campos marcados con * son obligatorios"); return;
    }

    const placaExistente = document.getElementById('r-placa').value;
    const placaNueva     = document.getElementById('r-placa-nueva').value.trim().toUpperCase();

    btn.disabled = true; btn.innerText = "PROCESANDO...";

    try {
        // Enviar datos al Excel usando la función del archivo db.js
        const res = await DB.registrarUsuario({
            nombre: nombre,
            usuario: usuario,
            password: password,
            telefono: telefono,
            rol: rol,
            regional: regional,
            placa_asignada: placaExistente || placaNueva || 'Ninguna'
        });

        if(res.ok) {
            alert("¡Registro enviado! Ya puedes intentar iniciar sesión.");
            cerrarRegistro();
            document.getElementById('user').value = usuario;
            document.getElementById('pass').value = password;
        } else {
            throw new Error("No se pudo conectar con el servidor de Excel");
        }
    } catch(e) {
        alert("Error en el registro: " + e.message);
    } finally {
        btn.disabled = false; btn.innerText = "REGISTRARME";
    }
}

// ── LÓGICA DE CARROZAS ──
function abrirModalCarroza() {
    document.getElementById('modal-carroza').classList.add('open');
    const sel = document.getElementById('sel-placa-existente');
    sel.innerHTML = '<option value="">Cargando flota...</option>';

    // Consultar flota desde Excel a través de db.js
    DB.obtenerFlota().then(res => {
        if (res.ok && res.data.length > 0) {
            sel.innerHTML = '<option value="">— Selecciona tu placa —</option>' +
                res.data.map(c => `<option value="${c.placa}">${c.placa} — ${c.modelo || ''}</option>`).join('');
        } else {
            sel.innerHTML = '<option value="">No hay carrozas disponibles</option>';
        }
    }).catch(() => { sel.innerHTML = '<option value="">Error al conectar</option>'; });
}

function cerrarModalCarroza() { document.getElementById('modal-carroza').classList.remove('open'); }

function switchTab(tab) {
    document.getElementById('panel-existente').style.display = tab === 'existente' ? 'block' : 'none';
    document.getElementById('panel-nueva').style.display     = tab === 'nueva'     ? 'block' : 'none';
}

function confirmarCarroza() {
    const sel = document.getElementById('sel-placa-existente');
    const nPlaca = document.getElementById('n-placa').value.trim();
    
    if (document.getElementById('panel-existente').style.display === 'block') {
        if (!sel.value) return alert("Selecciona una placa");
        document.getElementById('r-placa').value = sel.value;
        mostrarBadgeCarroza('🚗 ' + sel.options[sel.selectedIndex].text);
    } else {
        if (!nPlaca) return alert("Escribe la placa nueva");
        document.getElementById('r-placa-nueva').value = nPlaca;
        mostrarBadgeCarroza('🚗 ' + nPlaca + ' (Nueva)');
    }
    cerrarModalCarroza();
}

function mostrarBadgeCarroza(texto) {
    document.getElementById('carroza-badge-texto').textContent = texto;
    document.getElementById('carroza-badge').style.display = 'flex';
    document.getElementById('btn-agregar-carroza').style.display = 'none';
}

function limpiarCarroza() {
    document.getElementById('r-placa').value = '';
    document.getElementById('r-placa-nueva').value = '';
    document.getElementById('carroza-badge').style.display = 'none';
    document.getElementById('btn-agregar-carroza').style.display = 'block';
}
</script>
</body>
</html>
