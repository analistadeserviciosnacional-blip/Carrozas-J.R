<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.R. — Mis Averías</title>

    <!-- FIX: SDK actualizado a versión 2.49.0 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.0/dist/umd/supabase.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --azul: #000080;
            --celeste: #eef5ff;
            --blanco: #ffffff;
            --rojo: #dc2626;
            --verde: #25d366;
            --gris-texto: #64748b;
        }

        body {
            background: var(--celeste);
            font-family: 'DM Sans', sans-serif;
            padding: 20px;
            color: var(--azul);
            margin: 0;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn-volver {
            background: var(--blanco);
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            color: var(--azul);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-decoration: none;
            display: inline-block;
        }

        h2 { margin: 0; font-size: 20px; }

        .card-averia {
            background: var(--blanco);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,128,0.05);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .placa {
            font-weight: 700;
            font-size: 17px;
            color: var(--azul);
        }

        .fecha {
            color: var(--gris-texto);
            font-size: 11px;
            text-align: right;
        }

        .falla {
            color: var(--rojo);
            font-weight: 700;
            font-size: 14px;
            margin-top: 5px;
            text-transform: uppercase;
        }

        .descripcion {
            font-size: 13px;
            margin-top: 10px;
            color: #475569;
            background: #f8fafc;
            padding: 10px;
            border-radius: 8px;
            line-height: 1.4;
        }

        .btn-wa {
            width: 100%;
            background: var(--verde);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-wa:active { transform: scale(0.98); opacity: 0.9; }

        .loader {
            text-align: center;
            padding: 50px 20px;
            color: var(--gris-texto);
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="header">
        <a href="panel_conductor.html" class="btn-volver">←</a>
        <h2>Mis Reportes de Avería</h2>
    </div>

    <div id="lista-averias">
        <div class="loader">Cargando reportes del sistema...</div>
    </div>
</div>

<script src="db.js"></script>

<script>
const sesion = JSON.parse(localStorage.getItem('usuario_sesion') || localStorage.getItem('usuario_data') || '{}');

async function cargarAverias() {
    const lista = document.getElementById('lista-averias');

    if (!sesion || !sesion.nombre) {
        window.location.href = 'index.html';
        return;
    }

    try {
        const { data, error } = await DB.obtenerAveriasPorConductor(sesion.nombre);

        if (error) throw error;

        if (!data || data.length === 0) {
            lista.innerHTML = `
                <div class="loader">
                    <p>📭 No tienes reportes registrados.</p>
                    <small>Los reportes que envíes aparecerán aquí.</small>
                </div>`;
            return;
        }

        // FIX: se usan data-* para evitar XSS en onclick
        lista.innerHTML = data.map(av => {
            const fechaRegistro = av.created_at
                ? new Date(av.created_at).toLocaleString()
                : 'Fecha no disponible';

            return `
                <div class="card-averia">
                    <div class="info-row">
                        <span class="placa">🚗 Placa: ${av.placa_vehiculo}</span>
                        <span class="fecha">${fechaRegistro}</span>
                    </div>

                    <div class="falla">⚠️ ${av.tipo_falla}</div>

                    <div class="descripcion">
                        <strong>Síntomas:</strong><br>
                        ${av.descripcion_sintomas || 'Sin descripción detallada.'}
                    </div>

                    <button class="btn-wa"
                        data-placa="${av.placa_vehiculo}"
                        data-falla="${av.tipo_falla}"
                        onclick="reenviarWhatsApp(this)">
                        📱 REENVIAR POR WHATSAPP
                    </button>
                </div>
            `;
        }).join('');

    } catch (err) {
        console.error("Error al cargar averías:", err);
        lista.innerHTML = `<div class="loader" style="color:red;">❌ Error al conectar con la base de datos.</div>`;
    }
}

// FIX: recibe el botón y lee los data-* de forma segura
function reenviarWhatsApp(btn) {
    const placa = btn.dataset.placa;
    const falla = btn.dataset.falla;

    const mensaje =
        `*🚨 REPORTE DE AVERÍA J.R.*%0A` +
        `----------------------------%0A` +
        `🚗 *Vehículo:* ${placa}%0A` +
        `⚠️ *Falla:* ${falla}%0A` +
        `👤 *Reporta:* ${sesion.nombre}%0A` +
        `----------------------------%0A` +
        `_Reenviado desde el historial de la App._`;

    const numeroCoordinador = "573100000000";
    window.open(`https://wa.me/${numeroCoordinador}?text=${mensaje}`, '_blank');
}

window.onload = cargarAverias;
</script>

</body>
</html>
